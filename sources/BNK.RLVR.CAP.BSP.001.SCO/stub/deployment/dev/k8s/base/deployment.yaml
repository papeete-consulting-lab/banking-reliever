# BNK.RLVR.CAP.BSP.001.SCO contract+stub — Deployment manifest (BASE).
#
# Pure RabbitMQ publisher (no HTTP), one replica is enough for a dev stub.
# The image tag is patched by the overlay (`overlay/dev/`); base pins
# `:dev` so a stand-alone `kubectl apply -k base/` still resolves.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bsp-sco-stub
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bsp-sco-stub
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bsp-sco-stub
      annotations:
        # OTel resource hint — environment is patched by the overlay.
        bnk.observability/otel-service-name: bsp-sco-stub
    spec:
      # ServiceAccount issued by tech BNK.TECH.CAP.IDENTITY.001.WORKLOAD
      # (IRSA / Workload Identity); name + annotations are environment-
      # specific so they live in the overlay patch.
      serviceAccountName: bsp-sco-stub
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: stub
          image: bnk-rlvr-cap-bsp-001-sco-stub:dev
          imagePullPolicy: IfNotPresent
          env:
            - name: COMPONENT_PORT
              value: "23074"
            - name: STUB_ACTIVE
              value: "true"
            - name: STUB_CADENCE_PER_MIN
              value: "6"
            - name: STUB_THRESHOLD_PROBABILITY
              value: "0.1"
            - name: STUB_ENTRY_RATIO
              value: "0.1"
            - name: STUB_CASE_POOL_SIZE
              value: "8"
            - name: STUB_MODEL_VERSION
              value: "0.2.0"
            - name: STUB_SCHEMA_VERSION
              value: "0.2.0"
            - name: STUB_EXCHANGE_NAME
              value: "bsp.001.sco-events"
            - name: STUB_LOG_LEVEL
              value: "INFO"
            # RabbitMQ URL pulled from a Secret mounted by External Secrets
            # (BNK.TECH.CAP.IDENTITY.001.SECRETS). Key name is the canonical
            # platform contract — same on every L2.
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: bnk-platform-broker-rabbitmq
                  key: amqp_url
          # No HTTP server — liveness/readiness probe the AMQP socket via
          # a Python one-liner. Matches the local docker-compose contract.
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - |
                  import socket,os,urllib.parse as u
                  p=u.urlparse(os.environ['RABBITMQ_URL'])
                  s=socket.create_connection((p.hostname,p.port or 5672),timeout=3)
                  s.close()
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - |
                  import socket,os,urllib.parse as u
                  p=u.urlparse(os.environ['RABBITMQ_URL'])
                  s=socket.create_connection((p.hostname,p.port or 5672),timeout=2)
                  s.close()
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 250m
              memory: 192Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
