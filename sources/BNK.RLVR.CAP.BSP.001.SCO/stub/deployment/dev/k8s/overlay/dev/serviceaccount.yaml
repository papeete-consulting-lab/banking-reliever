# BNK.RLVR.CAP.BSP.001.SCO contract+stub — ServiceAccount with IRSA binding.
#
# Derived from `tech pack BNK.TECH.CAP.IDENTITY.001.WORKLOAD`.
# The annotation `eks.amazonaws.com/role-arn` is the canonical IRSA hook;
# the placeholder ARN is patched by GitOps at apply-time (the IAM role
# identity is created out-of-band by the platform team — see the
# escape-hatch in ../terraform/README.md if the module is missing).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bsp-sco-stub
  annotations:
    # IRSA — externalised; Terraform fills it on first apply via the
    # banking-tech IDENTITY module when available.
    eks.amazonaws.com/role-arn: "arn:aws:iam::000000000000:role/bnk-rlvr-cap-bsp-001-sco-stub-dev"
automountServiceAccountToken: true
