# Local development stack for the BNK.RLVR.CAP.BSP.001.SCO publication stub (Python rewrite).
# Per ADR-TECH-STRAT-001 the stub publishes resource events on the operational
# RabbitMQ rail. No PostgreSQL, no Kafka, no analytical rail — this is the
# Mode-B contract+stub bundle (TASK-002 of BNK.RLVR.CAP.BSP.001.SCO).
#
# Ports preserved from the prior .NET bundle so any external doc that referenced
# them keeps working:
#   AMQP        47656  → 5672
#   Management  47657  → 15672

services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: cap-bsp-001-sco-stub-rabbitmq
    ports:
      - "47656:5672"
      - "47657:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
