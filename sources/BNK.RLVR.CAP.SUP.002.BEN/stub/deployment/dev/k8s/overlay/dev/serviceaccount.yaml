# BNK.RLVR.CAP.SUP.002.BEN — stub — ServiceAccount with IRSA binding.
#
# Patches the base ServiceAccount with the dev IRSA role ARN. The role is
# created by `../../terraform/main.tf` (module `workload_identity`); the
# ARN is the canonical IRSA hook for EKS Pod Identity. Until Terraform
# applies, the annotation carries the placeholder ARN that the platform
# team fills out-of-band at apply-time.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sup-002-ben-stub
  annotations:
    # IRSA — patched per environment. Real ARN comes from Terraform
    # (module "workload_identity" in the per-component terraform root).
    eks.amazonaws.com/role-arn: "arn:aws:iam::000000000000:role/bnk-rlvr-cap-sup-002-ben-stub-dev"
automountServiceAccountToken: true
