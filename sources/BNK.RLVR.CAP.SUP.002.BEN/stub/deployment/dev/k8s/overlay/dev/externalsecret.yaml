# BNK.RLVR.CAP.SUP.002.BEN — stub — External Secrets binding.
#
# One Secret is materialised by External Secrets Operator from the platform
# secret store (per BNK.TECH.CAP.IDENTITY.001.SECRETS):
#
#   sup-002-ben-stub-broker  → RabbitMQ AMQP URL
#
# The stub has NO database (fixture-backed), so there is no `db` secret —
# unlike the backend overlay which materialises both broker and DB DSNs.
#
# The actual secret store ref is wired by the platform; we only declare
# the consumer contract here.

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: sup-002-ben-stub-broker
  annotations:
    reliever.io/derived-from: BNK.TECH.CAP.IDENTITY.001.SECRETS
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: reliever-platform-store
    kind: ClusterSecretStore
  target:
    name: sup-002-ben-stub-broker
    creationPolicy: Owner
  data:
    - secretKey: amqp_url
      remoteRef:
        key: dev/reliever/sup/002/ben/stub/broker
        property: amqp_url
