# Deployment contract — local environment (CLAUDE.md § "Deployment contract").
#
# This compose declares the STUB COMPONENT ONLY. Platform infrastructure
# (RabbitMQ) is a prerequisite, owned by the laptop platform install and
# resolved by SERVICE NAME on the shared external Docker network
# `reliever-platform`. For a self-contained run without the real platform,
# bring up `platform.compose.yml` first — it stands up the network and a
# RabbitMQ stand-in. The stub has NO database — it serves canned fixtures
# from `fixtures/*.json`.
#
# Component   : stub for BNK.RLVR.CAP.SUP.002.BEN (Beneficiary Identity Anchor)
# Kind        : api (Mode-B contract+stub — synthetic publisher + canned GET)
# Host port   : ${COMPONENT_PORT} (deterministic; see .env — 21595, salt=:1)
# Image       : reliever/sup-002-ben-stub:local
#
# Usage:
#   # OPTIONAL stand-in platform (network + RabbitMQ) — bring up FIRST:
#   docker compose -f sources/BNK.RLVR.CAP.SUP.002.BEN/stub/deployment/local/platform.compose.yml up -d
#
#   # The stub itself (build context is two levels up — the stub root —
#   # so the Dockerfile COPYs of pyproject/uv.lock/src/fixtures/config
#   # resolve relative to it):
#   docker compose -f sources/BNK.RLVR.CAP.SUP.002.BEN/stub/deployment/local/docker-compose.yml \
#                  --env-file sources/BNK.RLVR.CAP.SUP.002.BEN/stub/deployment/local/.env \
#                  up -d --build
#
#   curl -s http://localhost:${COMPONENT_PORT}/health | jq .

services:
  stub:
    image: reliever/sup-002-ben-stub:local
    container_name: sup-002-ben-stub
    hostname: sup-002-ben-stub
    build:
      context: ../..              # = sources/BNK.RLVR.CAP.SUP.002.BEN/stub/
      dockerfile: deployment/local/Dockerfile
    env_file:
      - .env
    environment:
      # Application-side bindings (uvicorn). The container's INTERNAL port
      # stays 8000 — the host binding to ${COMPONENT_PORT} is in the
      # `ports:` block below.
      RELIEVER_HTTP_HOST: "0.0.0.0"
      RELIEVER_HTTP_PORT: "8000"
      # Platform endpoint reached by SERVICE NAME on the shared network.
      # If the user runs the real platform install, `rabbitmq` resolves to
      # the real broker; if they run platform.compose.yml, the stand-in
      # answers instead. NO database — the stub is fixture-backed.
      RELIEVER_AMQP_URL: ${RELIEVER_AMQP_URL}
      # Stub-specific toggles preserved from the legacy compose. The master
      # switch is OFF by default — flip RELIEVER_STUB_ACTIVE=true to enable
      # the publisher loop + the HTTP query half. /health stays 200 either way.
      RELIEVER_STUB_ACTIVE: ${RELIEVER_STUB_ACTIVE}
      RELIEVER_STUB_HTTP_ACTIVE: ${RELIEVER_STUB_HTTP_ACTIVE}
      RELIEVER_CADENCE_MIN_PER_MINUTE: ${RELIEVER_CADENCE_MIN_PER_MINUTE}
      RELIEVER_CADENCE_MAX_PER_MINUTE: ${RELIEVER_CADENCE_MAX_PER_MINUTE}
      # Telemetry — the branch slug rides into the OTel environment tag and
      # the queue NAMES (bus isolation across concurrent worktrees).
      RELIEVER_OTEL_SERVICE_NAME: sup.002.ben-stub
      RELIEVER_OTEL_ENVIRONMENT: ${BRANCH}
      RELIEVER_BRANCH_SLUG: ${BRANCH}
    ports:
      - "${COMPONENT_PORT}:8000"
    networks:
      - reliever-platform
    restart: unless-stopped
    healthcheck:
      # HTTP /health is implemented by the FastAPI router — returns 200 once
      # the lifespan has loaded the canned fixtures (independent of
      # STUB_ACTIVE, per the stub's DoD note).
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 3s
      start_period: 15s
      retries: 6
    labels:
      capability_id: BNK.RLVR.CAP.SUP.002.BEN
      kind: api
      mode: stub
      zone: SUPPORT

networks:
  # SHARED external network owned by the platform. The component never
  # creates it — it joins the existing one. platform.compose.yml stands
  # one up for devs without the real platform.
  reliever-platform:
    external: true
    name: reliever-platform
