# Stub configuration — BNK.RLVR.CAP.SUP.002.BEN
# All values can be overridden via RELIEVER_* environment variables.

[service]
name = "reliever-beneficiary-identity-anchor-stub"
version = "0.1.0"
capability_id = "BNK.RLVR.CAP.SUP.002.BEN"
capability_zone = "SUPPORT"

[http]
host = "0.0.0.0"
port = 54679

[bus]
# Service-name form per the Deployment contract (CLAUDE.md). The platform
# RabbitMQ is reached on the shared external `reliever-platform` Docker
# network by service name. Local-dev override (host networking) can still
# set `RELIEVER_AMQP_URL=amqp://admin:password@localhost:5672/` via env.
amqp_url = "amqp://admin:password@rabbitmq:5672/"
exchange = "sup.002.ben-events"
# RVT family — single resource event family per process/BNK.RLVR.CAP.SUP.002.BEN/bus.yaml
resource_event = "BNK.RLVR.RVT.SUP.002.BENEFICIARY_ANCHOR_UPDATED"
business_event = "BNK.RLVR.EVT.SUP.002.BENEFICIARY_ANCHOR_UPDATED"
routing_key = "BNK.RLVR.EVT.SUP.002.BENEFICIARY_ANCHOR_UPDATED.BNK.RLVR.RVT.SUP.002.BENEFICIARY_ANCHOR_UPDATED"

[cadence]
min_per_minute = 1
max_per_minute = 10

[stub]
active = false
http_active = true
