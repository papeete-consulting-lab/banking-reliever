services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: beneficiary-identity-anchor-stub-rabbitmq
    ports:
      - "54879:5672"
      - "54880:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 10s
      retries: 5

  stub:
    build: .
    container_name: beneficiary-identity-anchor-stub
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RELIEVER_STUB_ACTIVE: "true"
      RELIEVER_AMQP_URL: "amqp://admin:password@rabbitmq:5672/"
      RELIEVER_HTTP_HOST: "0.0.0.0"
      RELIEVER_HTTP_PORT: "54679"
    ports:
      - "54679:54679"

volumes:
  rabbitmq_data:
