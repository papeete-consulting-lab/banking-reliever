# Deployment contract — local environment (CLAUDE.md § "Deployment contract").
#
# This compose declares the COMPONENT ONLY. Platform infrastructure
# (RabbitMQ + the per-L2 Postgres) is a prerequisite, owned by the laptop
# platform install and resolved by SERVICE NAME on the shared external
# Docker network `reliever-platform`. For a self-contained run without
# the real platform, bring up `platform.compose.yml` first — it stands
# up the network, a RabbitMQ stand-in, and a Postgres stand-in with the
# `beneficiary_anchor` DB pre-created.
#
# Component   : backend for BNK.RLVR.CAP.SUP.002.BEN (Beneficiary Identity Anchor)
# Kind        : api (Mode-A full microservice — REST + bus + outbox + projection)
# Host port   : ${COMPONENT_PORT} (deterministic; see .env)
# Image       : reliever/sup-002-ben-backend:local
#
# Usage:
#   # OPTIONAL stand-in platform (network + RabbitMQ + Postgres) — bring up FIRST:
#   docker compose -f sources/BNK.RLVR.CAP.SUP.002.BEN/backend/deployment/local/platform.compose.yml up -d
#
#   # The backend itself (build context is this folder — it copies pyproject + src
#   # from two levels up via relative paths in the Dockerfile COPY directives):
#   docker compose -f sources/BNK.RLVR.CAP.SUP.002.BEN/backend/deployment/local/docker-compose.yml \
#                  --env-file sources/BNK.RLVR.CAP.SUP.002.BEN/backend/deployment/local/.env \
#                  up -d --build
#
#   curl -s http://localhost:${COMPONENT_PORT}/health | jq .

services:
  backend:
    image: reliever/sup-002-ben-backend:local
    container_name: sup-002-ben-backend
    hostname: sup-002-ben-backend
    build:
      context: ../..              # = sources/BNK.RLVR.CAP.SUP.002.BEN/backend/
      dockerfile: deployment/local/Dockerfile
    env_file:
      - .env
    environment:
      # Application-side bindings (uvicorn). The container's INTERNAL port
      # stays 8000 — the host binding to ${COMPONENT_PORT} is in the
      # `ports:` block below.
      RELIEVER_HTTP_HOST: "0.0.0.0"
      RELIEVER_HTTP_PORT: "8000"
      # Platform endpoints reached by SERVICE NAME on the shared network.
      # If the user runs the real platform install, the same names resolve
      # to the real broker / DB; if they run platform.compose.yml, the
      # stand-in services answer instead.
      RELIEVER_PG_DSN: ${RELIEVER_PG_DSN}
      RELIEVER_AMQP_URL: ${RELIEVER_AMQP_URL}
      # Telemetry — the branch slug rides into the OTel environment tag and
      # the queue NAMES (bus isolation across concurrent worktrees).
      RELIEVER_OTEL_SERVICE_NAME: sup.002.ben-backend
      RELIEVER_OTEL_ENVIRONMENT: ${BRANCH}
      RELIEVER_BRANCH_SLUG: ${BRANCH}
    ports:
      - "${COMPONENT_PORT}:8000"
    networks:
      - reliever-platform
    restart: unless-stopped
    healthcheck:
      # HTTP /health is implemented by the FastAPI router — it returns 200
      # once the lifespan has applied migrations and the bus is reachable.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 3s
      start_period: 30s
      retries: 6
    labels:
      capability_id: BNK.RLVR.CAP.SUP.002.BEN
      kind: api
      zone: SUPPORT

networks:
  # SHARED external network owned by the platform. The component never
  # creates it — it joins the existing one. platform.compose.yml stands
  # one up for devs without the real platform.
  reliever-platform:
    external: true
    name: reliever-platform
