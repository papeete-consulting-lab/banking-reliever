# BNK.RLVR.CAP.SUP.002.BEN — backend — External Secrets bindings.
#
# Two Secrets are materialised by External Secrets Operator from the
# platform secret store (per BNK.TECH.CAP.IDENTITY.001.SECRETS):
#
#   1. sup-002-ben-backend-broker  → RabbitMQ AMQP URL
#   2. sup-002-ben-backend-db      → Postgres DSN (per-L2 RDS instance
#                                    provisioned by ../../terraform/main.tf)
#
# The actual secret store ref is wired by the platform; we only declare
# the consumer contracts here.

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: sup-002-ben-backend-broker
  annotations:
    reliever.io/derived-from: BNK.TECH.CAP.IDENTITY.001.SECRETS
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: reliever-platform-store
    kind: ClusterSecretStore
  target:
    name: sup-002-ben-backend-broker
    creationPolicy: Owner
  data:
    - secretKey: amqp_url
      remoteRef:
        key: dev/reliever/sup/002/ben/backend/broker
        property: amqp_url
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: sup-002-ben-backend-db
  annotations:
    reliever.io/derived-from: BNK.TECH.CAP.IDENTITY.001.SECRETS
    reliever.io/strategic-anchor: ADR-TECH-STRAT-004
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: reliever-platform-store
    kind: ClusterSecretStore
  target:
    name: sup-002-ben-backend-db
    creationPolicy: Owner
  data:
    - secretKey: dsn
      remoteRef:
        key: dev/reliever/sup/002/ben/backend/db
        property: dsn
