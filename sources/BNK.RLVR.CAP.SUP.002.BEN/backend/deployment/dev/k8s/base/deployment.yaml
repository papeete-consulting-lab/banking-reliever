# BNK.RLVR.CAP.SUP.002.BEN — backend — Deployment manifest (BASE).
#
# Mode-A microservice — REST + RabbitMQ publisher + projection consumer +
# outbox relay. One replica is enough for dev; train-release sizing is
# overlay-specific. The image tag is patched by the overlay (`overlay/dev/`);
# base pins `:dev` so a stand-alone `kubectl apply -k base/` still resolves.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sup-002-ben-backend
  annotations:
    # Anchors per the Deployment contract — agents NEVER read banking-tech
    # directly; every choice traces back to a `tech pack` consumption.
    reliever.io/derived-from: BNK.TECH.CAP.RUNTIME.001.DEPLOY
    reliever.io/strategic-anchor: ADR-TECH-STRAT-002
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: sup-002-ben-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sup-002-ben-backend
      annotations:
        # OTel resource hint — environment is patched by the overlay.
        reliever.io/otel-service-name: sup.002.ben-backend
    spec:
      # ServiceAccount issued by BNK.TECH.CAP.IDENTITY.001.WORKLOAD (IRSA);
      # name + role-arn annotation are environment-specific so they live
      # in overlay/dev/serviceaccount.yaml.
      serviceAccountName: sup-002-ben-backend
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          # Image tag is replaced by the overlay (per environment / train).
          image: reliever/sup-002-ben-backend:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: RELIEVER_HTTP_HOST
              value: "0.0.0.0"
            - name: RELIEVER_HTTP_PORT
              value: "8000"
            # Capability + telemetry identity (carried into queue names + OTel).
            - name: RELIEVER_CAPABILITY_ID
              value: BNK.RLVR.CAP.SUP.002.BEN
            - name: RELIEVER_OTEL_SERVICE_NAME
              value: sup.002.ben-backend
            # Bus credentials — sourced from External Secrets per
            # BNK.TECH.CAP.IDENTITY.001.SECRETS (binding emitted by overlay/dev).
            - name: RELIEVER_AMQP_URL
              valueFrom:
                secretKeyRef:
                  name: sup-002-ben-backend-broker
                  key: amqp_url
            # Postgres DSN — sourced from External Secrets per
            # BNK.TECH.CAP.IDENTITY.001.SECRETS (binding emitted by overlay/dev).
            # The DB itself is provisioned by Terraform — see
            # ../../terraform/main.tf (`data/db` module call).
            - name: RELIEVER_PG_DSN
              valueFrom:
                secretKeyRef:
                  name: sup-002-ben-backend-db
                  key: dsn
          # HTTP /health probes — exposed by the FastAPI router. The
          # readiness gate trips green once the lifespan has run migrations
          # and opened the bus channel.
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
