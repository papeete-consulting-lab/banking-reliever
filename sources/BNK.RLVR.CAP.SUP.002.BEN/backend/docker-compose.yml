services:
  postgres:
    image: postgres:16-alpine
    container_name: beneficiary-anchor-postgres
    environment:
      POSTGRES_USER: reliever
      POSTGRES_PASSWORD: reliever
      POSTGRES_DB: beneficiary_anchor
    ports:
      - "9043:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reliever -d beneficiary_anchor"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: beneficiary-anchor-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password
    ports:
      - "9054:5672"
      - "9055:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 10s
      retries: 5

  beneficiary-anchor:
    build: .
    container_name: beneficiary-anchor-api
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      RELIEVER_HTTP_HOST: "0.0.0.0"
      RELIEVER_HTTP_PORT: "8000"
      RELIEVER_PG_DSN: "postgresql://reliever:reliever@postgres:5432/beneficiary_anchor"
      RELIEVER_AMQP_URL: "amqp://admin:password@rabbitmq:5672/"
      # JSON Schemas are vendored inside the image (package-local default) — the
      # process model lives upstream in banking-knowledge (`bcm-pack process`),
      # so there is no process/ folder to mount here any more.
    ports:
      - "9080:8000"

volumes:
  postgres_data:
  rabbitmq_data:
