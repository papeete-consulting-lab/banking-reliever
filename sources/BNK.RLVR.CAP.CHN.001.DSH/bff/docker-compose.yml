# Local dev infrastructure for BNK.RLVR.CAP.CHN.001.DSH.
# Host ports are derived deterministically from the branch slug
# (BFF_PORT = 6080 + sha256(slug)[0..8] % 100; RABBIT_PORT = BFF_PORT + 100).
# Concrete values for this branch
# (feat/TASK-002-bff-foundation-subscriptions-aggregate):
#   BFF_PORT         = 6155 (the BFF itself is run via `dotnet run`)
#   RABBIT_PORT      = 6255  (AMQP — host -> container 5672)
#   RABBIT_MGMT_PORT = 6256  (Management UI — host -> container 15672)
#   FRONT_DEV_PORT   = 6355  (reserved for the sibling code-web-frontend agent)
#
# Branch isolation: queue NAMES carry the branch slug; exchange names are
# producer-owned and shared with upstream stubs (see README A6).

services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: chn-001-dsh-bff-rabbitmq
    hostname: chn-001-dsh-bff-rabbitmq
    ports:
      - "6255:5672"    # AMQP
      - "6256:15672"   # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

# To start:
#   docker compose -f sources/BNK.RLVR.CAP.CHN.001.DSH/bff/docker-compose.yml up -d
#   AMQP    : amqp://guest:guest@localhost:6255/
#   Mgmt UI : http://localhost:6256  (guest/guest)
#
# Then start the BFF:
#   cd sources/BNK.RLVR.CAP.CHN.001.DSH/bff
#   dotnet run --project src/Reliever.BeneficiaryDashboard.Bff
# (uses appsettings.Development.json which already targets port 6255)
