# Deployment contract — dev overlay (CLAUDE.md § "Deployment contract").
#
# Adds the dev namespace, the Ingress per ADR-TECH-STRAT-003 URL contract,
# PodSecurity + ResourceQuota per BNK.TECH.CAP.RUNTIME.001.DEPLOY, and the
# External-Secrets binding per BNK.TECH.CAP.IDENTITY.001.SECRETS.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: reliever-chn-dev

resources:
  - ../../base
  - namespace.yaml
  - ingress.yaml
  - resourcequota.yaml
  - externalsecret.yaml

commonAnnotations:
  reliever.io/environment: dev
  reliever.io/branch: task-007-migrate-bff-to-deployment-contract

images:
  - name: reliever/chn-001-dsh-bff
    newName: ${ECR_REGISTRY}/reliever/chn-001-dsh-bff
    newTag: dev-latest
