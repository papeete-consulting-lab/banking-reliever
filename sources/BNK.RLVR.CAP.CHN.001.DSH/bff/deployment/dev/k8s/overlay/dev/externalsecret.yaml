# ExternalSecret binds the broker credentials from the platform secret backend
# per BNK.TECH.CAP.IDENTITY.001.SECRETS. The actual backend ref is wired by
# the platform; we only declare the consumer contract here.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: chn-001-dsh-bff-broker
  annotations:
    reliever.io/derived-from: BNK.TECH.CAP.IDENTITY.001.SECRETS
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: reliever-platform-store
    kind: ClusterSecretStore
  target:
    name: chn-001-dsh-bff-broker
    creationPolicy: Owner
  data:
    - secretKey: host
      remoteRef:
        key: dev/reliever/chn/001/dsh/bff/broker
        property: host
    - secretKey: port
      remoteRef:
        key: dev/reliever/chn/001/dsh/bff/broker
        property: port
    - secretKey: username
      remoteRef:
        key: dev/reliever/chn/001/dsh/bff/broker
        property: username
    - secretKey: password
      remoteRef:
        key: dev/reliever/chn/001/dsh/bff/broker
        property: password
    - secretKey: vhost
      remoteRef:
        key: dev/reliever/chn/001/dsh/bff/broker
        property: vhost
