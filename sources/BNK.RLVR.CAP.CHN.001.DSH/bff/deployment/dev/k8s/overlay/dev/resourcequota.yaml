apiVersion: v1
kind: ResourceQuota
metadata:
  name: reliever-chn-dev-quota
  namespace: reliever-chn-dev
spec:
  hard:
    # Sized per BNK.TECH.CAP.RUNTIME.001.DEPLOY guidance for a CHANNEL-zone
    # modular monolith (one Deployment per L2 component, low density in dev).
    requests.cpu: "2"
    requests.memory: 2Gi
    limits.cpu: "4"
    limits.memory: 4Gi
    pods: "10"
