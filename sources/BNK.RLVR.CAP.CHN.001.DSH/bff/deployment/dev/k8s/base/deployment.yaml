apiVersion: apps/v1
kind: Deployment
metadata:
  name: chn-001-dsh-bff
  annotations:
    # Anchors per the Deployment contract — agents NEVER read banking-tech
    # directly; every choice traces back to a `tech pack` consumption.
    reliever.io/derived-from: BNK.TECH.CAP.RUNTIME.001.DEPLOY
    reliever.io/strategic-anchor: ADR-TECH-STRAT-002
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: chn-001-dsh-bff
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chn-001-dsh-bff
    spec:
      serviceAccountName: chn-001-dsh-bff
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bff
          # Image tag is replaced by the overlay (per environment / train).
          image: reliever/chn-001-dsh-bff:placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Development
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: Bff__CapabilityId
              value: BNK.RLVR.CAP.CHN.001.DSH
            - name: Telemetry__ServiceName
              value: chn.001.dsh-bff
            # Bus credentials sourced from External Secrets per
            # BNK.TECH.CAP.IDENTITY.001.SECRETS (binding emitted by overlay/dev/).
            - name: RabbitMQ__Host
              valueFrom:
                secretKeyRef:
                  name: chn-001-dsh-bff-broker
                  key: host
            - name: RabbitMQ__Port
              valueFrom:
                secretKeyRef:
                  name: chn-001-dsh-bff-broker
                  key: port
            - name: RabbitMQ__Username
              valueFrom:
                secretKeyRef:
                  name: chn-001-dsh-bff-broker
                  key: username
            - name: RabbitMQ__Password
              valueFrom:
                secretKeyRef:
                  name: chn-001-dsh-bff-broker
                  key: password
            - name: RabbitMQ__VirtualHost
              valueFrom:
                secretKeyRef:
                  name: chn-001-dsh-bff-broker
                  key: vhost
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "192Mi"
            limits:
              cpu: "500m"
              memory: "384Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
