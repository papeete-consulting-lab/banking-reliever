# Deployment contract — dev/k8s/base (CLAUDE.md § "Deployment contract").
#
# Derived from platform packs (consumed via `tech pack` — NEVER directly
# reading the banking-tech repo):
#   - BNK.TECH.CAP.RUNTIME.001.DEPLOY     → Modular-Monolith Packaging (Deployment + Service)
#   - BNK.TECH.CAP.IDENTITY.001.WORKLOAD  → ServiceAccount + IRSA annotation
#   - BNK.TECH.CAP.IDENTITY.001.SECRETS   → External Secrets binding (annotation hook)
# Strategic anchors:
#   - ADR-TECH-STRAT-002  — EKS / Modular-Monolith Packaging per Zone
#   - ADR-TECH-STRAT-003  — API URL contract: https://k8s.<base>/{env}/<CAP_ID>/api/
#   - ADR-TECH-TACT-001   — BFF runtime contract (REST/HTTP, ETag/304, polling).
#
# The base ships environment-agnostic resources. The overlay/dev/ adds the
# namespace, ingress, ResourceQuotas, and dev-specific patches.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: chn-001-dsh-bff
      app.kubernetes.io/component: bff
      app.kubernetes.io/part-of: reliever-chn
      reliever.io/capability-id: BNK.RLVR.CAP.CHN.001.DSH
      reliever.io/zone: CHANNEL
      reliever.io/kind: bff

resources:
  - serviceaccount.yaml
  - deployment.yaml
  - service.yaml
