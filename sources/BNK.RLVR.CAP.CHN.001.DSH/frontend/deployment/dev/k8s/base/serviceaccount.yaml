apiVersion: v1
kind: ServiceAccount
metadata:
  name: chn-001-dsh-frontend
  # IRSA annotation is patched by overlay/dev/ once Terraform creates the
  # corresponding IAM role per BNK.TECH.CAP.IDENTITY.001.WORKLOAD. The frontend
  # itself does not call AWS APIs — the SA exists so audit logs can attribute
  # pod traffic per the zero-trust posture in ADR-TECH-STRAT-002.
  annotations:
    reliever.io/derived-from: BNK.TECH.CAP.IDENTITY.001.WORKLOAD
