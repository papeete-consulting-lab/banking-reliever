# Deployment contract — local environment (CLAUDE.md § "Deployment contract").
#
# This compose owns the COMPONENT ONLY. The sibling BFF (TASK-007) runs in
# its own compose and is resolved by service name on the shared external
# Docker network `reliever-platform`.
#
# Component:  Frontend for BNK.RLVR.CAP.CHN.001.DSH (Beneficiary Dashboard)
# Kind:       frontend
# Host port:  ${COMPONENT_PORT} (deterministic, set in `.env`)
# Image:      reliever/chn-001-dsh-frontend:local
#
# Usage:
#   # Optional stand-in platform (network only — frontend needs no infra):
#   docker compose -f sources/BNK.RLVR.CAP.CHN.001.DSH/frontend/deployment/local/platform.compose.yml up -d
#
#   # The frontend itself (build context is the repo root):
#   docker compose -f sources/BNK.RLVR.CAP.CHN.001.DSH/frontend/deployment/local/docker-compose.yml \
#                  --env-file sources/BNK.RLVR.CAP.CHN.001.DSH/frontend/deployment/local/.env \
#                  up -d --build
#
#   # Open the dashboard — sibling BFF must also be up for the API to answer.
#   xdg-open "http://localhost:${COMPONENT_PORT}/?beneficiaireId=BEN-001"

services:
  frontend:
    image: reliever/chn-001-dsh-frontend:local
    container_name: chn-001-dsh-frontend
    hostname: chn-001-dsh-frontend
    build:
      context: ../../../../..        # repo root (5 levels up)
      dockerfile: sources/BNK.RLVR.CAP.CHN.001.DSH/frontend/deployment/local/Dockerfile
    ports:
      - "${COMPONENT_PORT}:80"
    networks:
      - reliever-platform
    restart: unless-stopped
    healthcheck:
      # nginx is up if `GET /healthz` returns 200. wget is part of the
      # busybox in nginx:alpine.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    labels:
      capability_id: BNK.RLVR.CAP.CHN.001.DSH
      kind: frontend
      zone: CHANNEL

networks:
  # SHARED external network owned by the platform. The frontend only joins
  # it so its nginx can reverse-proxy `/capabilities/...` to the sibling
  # BFF container by service name.
  reliever-platform:
    external: true
    name: reliever-platform
