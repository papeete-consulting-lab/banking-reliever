# nginx configuration for the BNK.RLVR.CAP.CHN.001.DSH frontend
# (Beneficiary Dashboard). Per the Deployment contract (CLAUDE.md §
# "Deployment contract (local + dev)") — local + dev share the same image,
# so this config is environment-agnostic.
#
# Responsibilities:
#   1. Serve the static bundle from /usr/share/nginx/html.
#   2. SPA-friendly fallback: any unknown path resolves to index.html so the
#      browser-side router can pick up.
#   3. Cache headers:
#        - long-cache (immutable, 1y) for hashed assets (none yet, but the
#          rule is forward-compatible);
#        - no-cache for index.html (so the browser always sees the latest
#          bundle version after a deploy).
#   4. Reverse-proxy `/capabilities/...` to the sibling BFF on the shared
#      external Docker network `reliever-platform`. The frontend's api.js
#      uses a relative `basePath: /capabilities/chn/001/dsh`, so this rule
#      means the static files DO NOT need to know the BFF's host:port —
#      same-origin fetch reaches the BFF transparently. No source change
#      required.
#
# The upstream name (`bff-upstream`) is resolved by Docker's embedded DNS to
# the BFF container's service name. In docker-compose that is set via the
# extra_hosts directive; in k8s it resolves to a kube-internal Service (see
# deployment/dev/k8s/overlay/dev/ingress.yaml which terminates the same
# `/capabilities/...` prefix at the ALB level instead, bypassing nginx).

server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── Health / readiness ────────────────────────────────────────────────
    # Plain text so k8s probes and the docker HEALTHCHECK can hit it without
    # asking for HTML — used by compose healthcheck above.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain always;
    }

    # ── BFF reverse proxy ─────────────────────────────────────────────────
    # api.js fetches /capabilities/chn/001/dsh/... — keep it same-origin so
    # CORS is a non-issue locally. The BFF runs on the shared external Docker
    # network `reliever-platform`; resolved by service name `chn-001-dsh-bff`.
    location /capabilities/ {
        # Resolver lets nginx re-resolve the upstream if the BFF container
        # restarts (Docker's embedded DNS, 127.0.0.11 in compose / k8s DNS).
        resolver 127.0.0.11 ipv6=off valid=10s;
        set $bff_upstream "http://chn-001-dsh-bff:8080";

        proxy_pass         $bff_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Preserve If-None-Match for ETag-driven 304 responses.
        proxy_pass_request_headers on;
        # Pass 304 back unchanged (otherwise nginx may add a body).
        proxy_intercept_errors off;

        # Generous read timeout — the BFF's max age is PT5S, but polling
        # may queue.
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # ── Static bundle ─────────────────────────────────────────────────────
    # index.html — never cache (so consent-gate + dignity-rule + i18n bundles
    # always reload after a deploy).
    location = / {
        try_files /index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma        "no-cache"                              always;
        add_header Expires       "0"                                     always;
    }
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma        "no-cache"                              always;
        add_header Expires       "0"                                     always;
    }

    # Hashed / fingerprinted assets — long cache, immutable. The bundle is
    # currently un-hashed, but the rule is here for forward compatibility
    # with a future bundler. Matches anything with an 8+ hex content hash
    # before the extension.
    location ~* "\.([0-9a-f]{8,})\.(js|css|svg|png|jpg|webp|woff2?)$" {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Un-hashed JS / CSS — short-cache, validate on each load.
    location ~* "\.(js|css)$" {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    # Fonts / images — medium cache.
    location ~* "\.(svg|png|jpg|jpeg|gif|webp|woff|woff2|ttf|eot|ico)$" {
        access_log off;
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri =404;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────
    # Any other path → serve index.html so a browser-side router can pick it
    # up. Query strings (beneficiaireId=, consentement=, …) reach the SPA
    # unchanged.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security & operational headers ────────────────────────────────────
    server_tokens off;

    # Permissive defaults — institutional CSP / HSTS land at the ALB level
    # in dev/prod (see ADR-TECH-STRAT-003) and would be too restrictive for
    # local testing harnesses (dev.html iframe injection).
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options        SAMEORIGIN always;
    add_header Referrer-Policy        no-referrer-when-downgrade always;

    # Gzip — bundle is small but stub-data + i18n benefit.
    gzip              on;
    gzip_vary         on;
    gzip_min_length   512;
    gzip_types        text/plain text/css application/javascript application/json image/svg+xml;
    gzip_proxied      any;
    gzip_comp_level   6;
}
