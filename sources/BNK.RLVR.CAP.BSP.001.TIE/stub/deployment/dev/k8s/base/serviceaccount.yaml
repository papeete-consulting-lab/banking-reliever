# BNK.RLVR.CAP.BSP.001.TIE — workload identity per
# BNK.TECH.CAP.IDENTITY.001.WORKLOAD. The IRSA role ARN is injected by
# `overlay/{env}/` (annotation `eks.amazonaws.com/role-arn`) since it carries
# the AWS account and env path.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bsp-001-tie-stub
  annotations:
    # Populated by overlay (e.g. arn:aws:iam::<acct>:role/dev-bsp-001-tie-stub).
    eks.amazonaws.com/role-arn: ""
