meta:
  capability: BNK.RLVR.CAP.BSP.001.TIE
  layer: process-modelling
  version: 0.1.0
  governing_adrs:
    - ADR-BCM-FUNC-0005

# ──────────────────────────────────────────────────────────────
# Policies — reactive rules. A policy listens to one or more
# events and issues a command. Policies are the only place in
# the model where consumed events become commands; aggregates
# never subscribe to events directly.
# Identifier: POL.<ZONE>.<L1>.<L2>.<NAME>
# ──────────────────────────────────────────────────────────────

policies:

  - id: POL.BSP.001.TIE.ON_SCORE_THRESHOLD_REACHED
    name: Apply tier transition on behavioural score threshold crossing
    intent: >-
      Translate every score-threshold crossing emitted by BNK.RLVR.CAP.BSP.001.SCO into
      a tier-transition command. The polarity (UPGRADE or DOWNGRADE) is derived
      from the threshold metadata — never from a redundant computation here.
    listens_to:
      - resource_event: BNK.RLVR.RVT.BSP.001.SCORE_THRESHOLD_REACHED
        business_subscription: BNK.RLVR.SUB.BUSINESS.BSP.001.TIE.001    # to be authored — see open question
        resource_subscription: BNK.RLVR.SUB.RESOURCE.BSP.001.TIE.001    # to be authored — see open question
        trigger_kind: SCORE_THRESHOLD
    issues: CMD.BSP.001.TIE.APPLY_TIER_TRANSITION
    mapping_rule: >-
      Build CMD payload from the upstream resource event:
        case_id                  <- upstream.case_id
        trigger.event_id         <- upstream.event_id (used for idempotency)
        trigger.kind             <- SCORE_THRESHOLD
        transition.direction     <- UPGRADE if upstream.threshold_kind == UPWARD
                                    DOWNGRADE if upstream.threshold_kind == DOWNWARD
        transition.target_tier   <- upstream.target_tier_code
        transition.source_tier   <- upstream.source_tier_code
        occurred_at              <- upstream.computation_timestamp
    error_handling:
      - on: TRIGGER_ALREADY_PROCESSED
        action: ack-and-drop
      - on: OVERRIDE_IN_FORCE
        action: ack-and-drop
        rationale: >-
          Algorithmic transitions are intentionally suspended while a prescriber
          override is in force. The next score threshold after the override is
          closed will re-drive the algorithmic decision.
      - on: BENEFICIARY_UNKNOWN
        action: dlq
        rationale: Upstream emitted for a case unknown to the reference — investigate.
      - on: INVALID_TIER_CODE
        action: dlq
        rationale: >-
          SCO emitted a target_tier_code not present in the current REF
          definition — likely an out-of-sync tier-definitions snapshot.
      - on: TRIGGER_DIRECTION_MISMATCH
        action: dlq
        rationale: Policy mapping inconsistency — the threshold metadata is suspect.
    delivery: at-least-once
    open_question: >-
      The BCM corpus does not currently declare BNK.RLVR.SUB.BUSINESS.BSP.001.TIE.001
      and BNK.RLVR.SUB.RESOURCE.BSP.001.TIE.001 (TIE consuming SCO). The producer
      side (BNK.RLVR.CAP.BSP.001.SCO/bus.yaml) already lists BNK.RLVR.CAP.BSP.001.TIE as a
      consumer of BNK.RLVR.EVT.SCORE_THRESHOLD_REACHED.#, so the contract is
      effectively in place — but the formal subscription chain must be
      added in banking-knowledge before /code runs.

  - id: POL.BSP.001.TIE.ON_ARBITRATION_OVERRIDE_VALIDATED
    name: Confirm prescriber override on arbitration validation
    intent: >-
      When BNK.RLVR.CAP.BSP.001.ARB emits a validated-override event, mark the matching
      active override as CONFIRMED_BY_ARBITRATION inside the TIE aggregate.
      The override remains in force; algorithmic resumption is still gated
      until ARB emits a closure event.
    listens_to:
      - resource_event: BNK.RLVR.RVT.BSP.001.ARBITRATION_OVERRIDE_VALIDATED
        business_subscription: BNK.RLVR.SUB.BUSINESS.BSP.001.TIE.002    # to be authored
        resource_subscription: BNK.RLVR.SUB.RESOURCE.BSP.001.TIE.002    # to be authored
        trigger_kind: OVERRIDE_VALIDATED
    issues: CMD.BSP.001.TIE.CONFIRM_PRESCRIBER_OVERRIDE
    mapping_rule: >-
      Build CMD payload from the upstream resource event:
        case_id              <- upstream.case_id
        override_id          <- upstream.override_id
        trigger.event_id     <- upstream.event_id (used for idempotency)
        validated_at         <- upstream.validated_at
    error_handling:
      - on: TRIGGER_ALREADY_PROCESSED
        action: ack-and-drop
      - on: NO_ACTIVE_OVERRIDE
        action: dlq
        rationale: >-
          ARB validated an override TIE has no record of — the override may
          have been closed before validation arrived. Operational anomaly.
      - on: OVERRIDE_ID_MISMATCH
        action: dlq
        rationale: Inconsistent override_id between TIE and ARB — investigate.
    delivery: at-least-once
    open_question: >-
      Should TIE emit an event when transitioning the override from
      PENDING_ARBITRATION to CONFIRMED_BY_ARBITRATION? Current sketch says
      no (ARB already publishes the validation). Revisit if downstream
      consumers need TIE-side confirmation for audit lineage.

  - id: POL.BSP.001.TIE.ON_ARBITRATION_ALGORITHM_REAFFIRMED
    name: Close prescriber override on arbitration reaffirming the algorithm
    intent: >-
      When BNK.RLVR.CAP.BSP.001.ARB emits an algorithm-reaffirmed event (override is
      to be closed), clear the active override on the TIE aggregate. If the
      algorithm-resolved tier differs from the override-applied tier, the
      command atomically emits the corresponding transition event.
    listens_to:
      - resource_event: BNK.RLVR.RVT.BSP.001.OVERRIDE_CLOSED
        business_subscription: BNK.RLVR.SUB.BUSINESS.BSP.001.TIE.003    # to be authored
        resource_subscription: BNK.RLVR.SUB.RESOURCE.BSP.001.TIE.003    # to be authored
        trigger_kind: ALGORITHM_REAFFIRMED
    issues: CMD.BSP.001.TIE.CLOSE_PRESCRIBER_OVERRIDE
    mapping_rule: >-
      Build CMD payload from the upstream resource event:
        case_id                          <- upstream.case_id
        override_id                      <- upstream.override_id
        trigger.event_id                 <- upstream.event_id
        closure_reason                   <- upstream.closure_reason
        algorithmic_tier_at_closure      <- upstream.algorithmic_tier_code
        algorithmic_tier_score_event_id  <- upstream.score_event_id
        closed_at                        <- upstream.closed_at
    error_handling:
      - on: TRIGGER_ALREADY_PROCESSED
        action: ack-and-drop
      - on: NO_ACTIVE_OVERRIDE
        action: dlq
        rationale: ARB closed an override TIE has no record of — investigate.
      - on: OVERRIDE_ID_MISMATCH
        action: dlq
        rationale: Inconsistent override_id between TIE and ARB — investigate.
    delivery: at-least-once
    open_question: >-
      The closure command needs the algorithm-resolved tier to decide whether
      to emit a realignment transition. Sketch assumes ARB carries this in
      the OVERRIDE_CLOSED payload (algorithmic_tier_code + score_event_id).
      If ARB cannot supply it, TIE must query BNK.RLVR.CAP.BSP.001.SCO at command
      time — see README "Open process-level questions".

  - id: POL.BSP.001.TIE.ON_BENEFICIARY_ENROLLED
    name: Seed initial tier on enrolment completion
    status: placeholder
    intent: >-
      When a beneficiary completes enrolment, materialise the TIE aggregate
      with the entry tier resolved from BNK.RLVR.CAP.REF.001.TIE — proactive seeding,
      symmetric with POL.BSP.001.SCO.ON_ENROLMENT_COMPLETED. Without this
      policy the aggregate is materialised lazily on the first algorithmic
      transition or override; both paths converge on the same starting tier.
    listens_to:
      - business_event: BNK.RLVR.EVT.BSP.002.ENROLMENT_COMPLETED  # FUNC-0006 (BNK.RLVR.CAP.BSP.002 — Access & Enrollment). Symmetric with POL.BSP.001.SCO.ON_ENROLMENT_COMPLETED. Upstream not yet process-modelled — promote to resource_event + bus.yaml subscription once a BNK.RLVR.SUB.BUSINESS is declared in BCM for BNK.RLVR.CAP.BSP.001.TIE.
    issues: null
    open_question: >-
      Two options: (a) add this policy and a CMD.SEED_INITIAL_TIER (no bus
      event emitted, silent state creation), or (b) keep lazy materialisation
      via read-through to BNK.RLVR.CAP.REF.001.TIE. Sketch defaults to (b) — the
      aggregate has no observable "uninitialised" state from a consumer
      perspective. Revisit if dashboards need the entry tier visible before
      the first transition.
    error_handling: []
    delivery: at-least-once

  - id: POL.BSP.001.TIE.ON_TIER_DEFINITION_UPDATED
    name: Refresh cached tier definitions on referential change
    status: placeholder
    intent: >-
      When BNK.RLVR.CAP.REF.001.TIE updates its definitions, refresh the
      tier_definitions_version snapshot held in TIE so subsequent commands
      validate against the new ordering and codes. No tier transition is
      issued by this policy — only configuration sync.
    listens_to:
      - business_event: BNK.RLVR.EVT.REF.001.TIER_DEFINITION_UPDATED
        # corresponding RVT to be confirmed once BNK.RLVR.CAP.REF.001.TIE process model exists
    issues: null
    open_question: >-
      BNK.RLVR.CAP.REF.001.TIE has not been processed yet — its emitted resource event
      and routing key are unknown. Mark as placeholder until the REF process
      model is authored.
    error_handling: []
    delivery: at-least-once
