meta:
  capability: BNK.RLVR.CAP.BSP.001.TIE
  layer: process-modelling
  version: 0.1.0

# ──────────────────────────────────────────────────────────────
# Read models — projections built from this capability's domain
# events for query-time consumption. Read models are owned by
# this capability; outside consumers do not query the aggregate
# directly, they either subscribe to events or call a query.
# Identifier: PRJ.<ZONE>.<L1>.<L2>.<NAME>
# ──────────────────────────────────────────────────────────────

read_models:

  - id: PRJ.BSP.001.TIE.CURRENT_TIER_VIEW
    name: Current tier view of a case
    backs_resource: null   # the CURRENT_TIER snapshot is not a BCM-declared resource
    fed_by:
      - BNK.RLVR.RVT.BSP.001.TIER_UPGRADE_RECORDED
      - BNK.RLVR.RVT.BSP.001.TIER_DOWNGRADE_RECORDED
      - BNK.RLVR.RVT.BSP.001.OVERRIDE_ACTIVATED
    fields:
      - case_id
      - current_tier_code
      - previous_tier_code
      - transitioned_at
      - has_active_override
      - active_override_summary    # nullable — applied_tier_code, prescriber_id, validation_state, applied_at, valid_until
      - tier_definitions_version
    consistency: eventual
    fallback: >-
      When no transition has been recorded yet for a case, the projection
      returns the entry tier resolved from BNK.RLVR.CAP.REF.001.TIE — same value the
      aggregate would resolve on lazy materialisation. This avoids 404s
      for newly enrolled beneficiaries who have not yet crossed any
      threshold.

  - id: PRJ.BSP.001.TIE.TIER_HISTORY
    name: Tier transition history (audit trail)
    backs_resource: null
    fed_by:
      - BNK.RLVR.RVT.BSP.001.TIER_UPGRADE_RECORDED
      - BNK.RLVR.RVT.BSP.001.TIER_DOWNGRADE_RECORDED
      - BNK.RLVR.RVT.BSP.001.OVERRIDE_ACTIVATED
    fields:
      - case_id
      - transition_id
      - direction              # UPGRADE | DOWNGRADE | OVERRIDE_ACTIVATED
      - from_tier_code
      - to_tier_code
      - prescriber_id          # nullable — only set for OVERRIDE_ACTIVATED
      - trigger_event_id
      - rationale              # nullable — only set for OVERRIDE_ACTIVATED
      - occurred_at
    retention: lifetime    # programme-long audit trail per ADR-BCM-FUNC-0005 traceability
    consistency: eventual

# ──────────────────────────────────────────────────────────────
# Queries — read endpoints exposed by this capability. Each
# query is served by exactly one projection.
# Identifier: QRY.<ZONE>.<L1>.<L2>.<NAME>
# ──────────────────────────────────────────────────────────────

queries:

  - id: QRY.BSP.001.TIE.GET_CURRENT_TIER
    served_by: PRJ.BSP.001.TIE.CURRENT_TIER_VIEW
    request:
      case_id: string
    response:
      shape: object
      fields:
        - case_id
        - current_tier_code
        - previous_tier_code
        - transitioned_at
        - has_active_override
        - active_override_summary
    consumers:
      - BNK.RLVR.CAP.CHN.001.DSH    # beneficiary dashboard — current tier label and badge
      - BNK.RLVR.CAP.CHN.002.VUE    # prescriber view — tier + override controls
      - BNK.RLVR.CAP.BSP.004.ENV    # envelope allocation needs the current tier
      - BNK.RLVR.CAP.B2B.001.CRD    # dedicated card rules keyed on current tier
      - BNK.RLVR.CAP.BSP.001.SCO    # scoring may read current tier for context
      - BNK.RLVR.CAP.BSP.001.ARB    # arbitration evaluates algorithm vs override
    api_binding: { method: GET, path: /cases/{case_id}/tier }
    cache: { etag: true, max_age: PT5S }

  - id: QRY.BSP.001.TIE.LIST_TIER_HISTORY
    served_by: PRJ.BSP.001.TIE.TIER_HISTORY
    request:
      case_id: string
      since: { type: date, optional: true }
      limit: { type: integer, default: 50, max: 500 }
    response:
      shape: array
      item_fields:
        - transition_id
        - direction
        - from_tier_code
        - to_tier_code
        - prescriber_id
        - trigger_event_id
        - rationale
        - occurred_at
    consumers:
      - BNK.RLVR.CAP.CHN.002.VUE    # prescriber timeline of tier transitions
      - BNK.RLVR.CAP.BSP.001.ARB    # arbitration audit
    api_binding: { method: GET, path: /cases/{case_id}/tier-history }
