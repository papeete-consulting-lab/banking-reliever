meta:
  capability: BNK.RLVR.CAP.BSP.001.TIE
  layer: process-modelling
  version: 0.1.0
  governing_adrs:
    - ADR-BCM-FUNC-0005      # L2 breakdown of BNK.RLVR.CAP.BSP.001 — defines emitted/consumed events
    - ADR-BCM-URBA-0009      # Definition of an event-driven capability
    - ADR-TECH-STRAT-001     # Bus topology rules (Rule 3 — payload form is domain-event-DDD)

# ──────────────────────────────────────────────────────────────
# Aggregates — the consistency boundaries of this capability.
# Each AGG owns a piece of state, accepts commands, enforces
# invariants atomically, and emits domain events on transition.
# Identifier: AGG.<ZONE>.<L1>.<L2>.<NAME>
# ──────────────────────────────────────────────────────────────

aggregates:

  - id: AGG.BSP.001.TIE.TIER_OF_CASE
    name: Tier of a remediation case
    business_object: BNK.RLVR.OBJ.BSP.001.TIER_CHANGE
    aggregate_id_field: case_id
    cardinality: one-per-case
    description: >-
      Per-beneficiary singleton holding the currently effective autonomy tier,
      its transition history, and the active prescriber override (if any). All
      tier transitions for a given case pass through this aggregate to guarantee:
        - exactly one effective tier at any point in time (CPT.BCM.000.TIER rule);
        - mutual exclusion between algorithmic transitions and prescriber overrides;
        - causal idempotency on every upstream trigger event.
      The aggregate is materialised lazily on the first algorithmic transition or
      prescriber override — there is no dedicated "tier-initialised" event in the
      BCM, so the entry tier is resolved on creation via a read-through to
      BNK.RLVR.CAP.REF.001.TIE.

    state:
      - field: case_id
        kind: identity
      - field: current_tier_code
        kind: snapshot
      - field: previous_tier_code
        kind: snapshot
        nullable_until_initialised: true
      - field: transitioned_at
        kind: snapshot
      - field: active_override
        kind: snapshot
        nullable: true
        shape:
          override_id: string
          prescriber_id: string
          applied_tier_code: string
          applied_at: timestamp
          validation_state: enum [PENDING_ARBITRATION, CONFIRMED_BY_ARBITRATION]
          valid_until: timestamp-nullable
          rationale: string
      - field: last_processed_trigger_event_id
        kind: idempotency
      - field: tier_definitions_version
        kind: read-through  # snapshot of BNK.RLVR.CAP.REF.001.TIE config at last transition
      - field: model_version
        kind: configuration

    accepted_commands:
      - CMD.BSP.001.TIE.APPLY_TIER_TRANSITION
      - CMD.BSP.001.TIE.APPLY_PRESCRIBER_OVERRIDE
      - CMD.BSP.001.TIE.CONFIRM_PRESCRIBER_OVERRIDE
      - CMD.BSP.001.TIE.CLOSE_PRESCRIBER_OVERRIDE

    emitted_resource_events:
      - BNK.RLVR.RVT.BSP.001.TIER_UPGRADE_RECORDED
      - BNK.RLVR.RVT.BSP.001.TIER_DOWNGRADE_RECORDED
      - BNK.RLVR.RVT.BSP.001.OVERRIDE_ACTIVATED

    invariants:
      - id: INV.TIE.001
        rule: >-
          A case_id has exactly one effective tier at any point in time. The
          current_tier_code is never null once the aggregate exists; on lazy
          creation, the aggregate reads the entry tier from BNK.RLVR.CAP.REF.001.TIE
          before applying the first command.
        rationale: >-
          CPT.BCM.000.TIER canonical rule — "a case holds exactly one active
          tier at any given time". Enforced by the aggregate so consumers can
          rely on a single-source-of-truth read model.

      - id: INV.TIE.002
        rule: >-
          An algorithmic transition (CMD.APPLY_TIER_TRANSITION) is rejected if
          an active prescriber override is in force, regardless of validation
          state. Algorithmic transitions can only resume once the override has
          been closed (CMD.CLOSE_PRESCRIBER_OVERRIDE).
        rationale: >-
          Per ADR-BCM-FUNC-0005, prescriber override pre-empts the algorithm.
          Mutual exclusion is enforced atomically inside the aggregate so the
          policy on the upstream threshold event cannot race the override.

      - id: INV.TIE.003
        rule: >-
          The target tier of a prescriber override and the target tier of an
          algorithmic transition must both be valid tier_code values declared
          in the current BNK.RLVR.CAP.REF.001.TIE definition snapshot. Otherwise the
          command is rejected with an INVALID_TIER_CODE error.
        rationale: >-
          CPT.BCM.000.TIER canonical rule — "the canonical definition of a tier
          is held exclusively by BNK.RLVR.CAP.REF.001.TIE". TIE is a referential
          consumer, never a tier-catalogue authority.

      - id: INV.TIE.004
        rule: >-
          A single trigger.event_id is applied at most once. Duplicates from
          the bus are silently dropped (idempotent no-op). Applies to
          CMD.APPLY_TIER_TRANSITION (keyed by upstream resource event id),
          CMD.CONFIRM_PRESCRIBER_OVERRIDE (keyed by ARB validation event id),
          and CMD.CLOSE_PRESCRIBER_OVERRIDE (keyed by ARB closure event id).
        rationale: >-
          At-least-once delivery on the bus (ADR-TECH-STRAT-001) — every
          consumer must tolerate replay.

      - id: INV.TIE.005
        rule: >-
          CMD.CLOSE_PRESCRIBER_OVERRIDE compares the override-applied tier
          against the algorithm-resolved tier (computed from the latest
          known score and the current tier-definition snapshot). When they
          differ, the closure emits the appropriate transition event
          (BNK.RLVR.RVT.TIER_UPGRADE_RECORDED or BNK.RLVR.RVT.TIER_DOWNGRADE_RECORDED) atomically
          with the override clearing. When they coincide, the closure emits
          no transition event (silent realignment).
        rationale: >-
          Avoids a downstream race where consumers see "override closed" but
          the new effective tier is unclear. Either the closure restores the
          algorithmic tier with an explicit transition event, or no change
          is observable.
        open_question: >-
          The latest algorithm-resolved tier requires reading the latest
          BNK.RLVR.RVT.SCORE_THRESHOLD_REACHED state from BNK.RLVR.CAP.BSP.001.SCO. Should TIE
          materialise this as a denormalised projection inside the aggregate,
          or query SCO at command time? See README "Open process-level questions".

    consistency_boundary: per-aggregate-instance
    transactional_outbox: required
    snapshotting:
      strategy: every-N-events
      n: 50  # tier transitions are rarer than score recomputations
