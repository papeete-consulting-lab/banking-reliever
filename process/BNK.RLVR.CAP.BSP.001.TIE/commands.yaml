meta:
  capability: BNK.RLVR.CAP.BSP.001.TIE
  layer: process-modelling
  version: 0.1.0
  governing_adrs:
    - ADR-BCM-FUNC-0005
    - ADR-BCM-URBA-0009

# ──────────────────────────────────────────────────────────────
# Commands — verbs this capability accepts. Each CMD is the
# unit a client (HTTP API, in-process policy, saga) issues to
# request a state transition. A CMD is always handled by exactly
# one aggregate, and emits zero or more domain events.
# Identifier: CMD.<ZONE>.<L1>.<L2>.<VERB>
# ──────────────────────────────────────────────────────────────

commands:

  - id: CMD.BSP.001.TIE.APPLY_TIER_TRANSITION
    name: Apply algorithmic tier transition on threshold crossing
    intent: >-
      Translate a behavioural-score threshold crossing (upward or downward)
      into a tier transition. Updates the case's current tier and emits the
      paired upgrade or downgrade event. Atomic with the threshold-direction
      check — never emits a transition that contradicts its trigger direction.
    accepted_by: AGG.BSP.001.TIE.TIER_OF_CASE
    issued_by:
      - POL.BSP.001.TIE.ON_SCORE_THRESHOLD_REACHED
    payload_schema: schemas/CMD.BSP.001.TIE.APPLY_TIER_TRANSITION.schema.json
    preconditions:
      - id: PRE.001
        rule: case_id resolves to an active beneficiary record in BNK.RLVR.CAP.REF.001.BEN.
      - id: PRE.002
        rule: No active prescriber override is currently in force on this case.
      - id: PRE.003
        rule: target_tier_code is a valid tier in the current BNK.RLVR.CAP.REF.001.TIE definition.
      - id: PRE.004
        rule: trigger.event_id has not already been processed (idempotency by causation).
    invariants_enforced:
      - INV.TIE.001
      - INV.TIE.002
      - INV.TIE.003
      - INV.TIE.004
    emits:
      # Exactly one of the following, depending on transition.direction.
      # Only resource events are autonomous bus messages (Rule 2 of ADR-TECH-STRAT-001).
      # The paired business-event family (BNK.RLVR.EVT.BSP.001.TIER_UPGRADED /
      # BNK.RLVR.EVT.BSP.001.TIER_DOWNGRADED) appears only as the prefix of the
      # routing key — see bus.yaml.
      - BNK.RLVR.RVT.BSP.001.TIER_UPGRADE_RECORDED        # when transition.direction == UPGRADE
      - BNK.RLVR.RVT.BSP.001.TIER_DOWNGRADE_RECORDED      # when transition.direction == DOWNGRADE
    errors:
      - code: BENEFICIARY_UNKNOWN
        when: case_id does not resolve in BNK.RLVR.CAP.REF.001.BEN.
      - code: OVERRIDE_IN_FORCE
        when: An active prescriber override is currently applied — algorithmic transitions are suspended.
      - code: INVALID_TIER_CODE
        when: target_tier_code is not declared in BNK.RLVR.CAP.REF.001.TIE.
      - code: TRIGGER_ALREADY_PROCESSED
        when: trigger.event_id has previously been applied.
      - code: TRIGGER_DIRECTION_MISMATCH
        when: >-
          transition.direction contradicts the score delta described in the
          trigger payload (e.g. claims UPGRADE but the source-tier score
          decreased). Reject — the policy mapping is broken upstream.
    idempotency:
      key: trigger.event_id
      window: 30d
    api_binding: { method: POST, path: /cases/{case_id}/tier-transitions }

  - id: CMD.BSP.001.TIE.APPLY_PRESCRIBER_OVERRIDE
    name: Apply a prescriber tier override
    intent: >-
      A prescriber forces a tier on a case against the algorithmic decision.
      Activates the override (state PENDING_ARBITRATION), pauses algorithmic
      transitions, and emits an OVERRIDE_ACTIVATED event so BNK.RLVR.CAP.BSP.001.ARB
      can begin its validation cycle.
    accepted_by: AGG.BSP.001.TIE.TIER_OF_CASE
    issued_by:
      - http_caller: BNK.RLVR.CAP.CHN.002.VUE   # prescriber UI
    payload_schema: schemas/CMD.BSP.001.TIE.APPLY_PRESCRIBER_OVERRIDE.schema.json
    preconditions:
      - id: PRE.001
        rule: case_id resolves to an active beneficiary record in BNK.RLVR.CAP.REF.001.BEN.
      - id: PRE.002
        rule: prescriber_id is authorised to act on this case (resolved via BNK.RLVR.CAP.SUP.001 — out of scope).
      - id: PRE.003
        rule: applied_tier_code is a valid tier in the current BNK.RLVR.CAP.REF.001.TIE definition.
      - id: PRE.004
        rule: No prior override is active on the case (a closed override unblocks this command).
    invariants_enforced:
      - INV.TIE.001
      - INV.TIE.003
      - INV.TIE.004
    emits:
      - BNK.RLVR.RVT.BSP.001.OVERRIDE_ACTIVATED
      # Paired business-event family (routing-key only, no autonomous message — Rule 2):
      # BNK.RLVR.EVT.BSP.001.TIER_OVERRIDE_APPLIED
    errors:
      - code: BENEFICIARY_UNKNOWN
        when: case_id does not resolve in BNK.RLVR.CAP.REF.001.BEN.
      - code: PRESCRIBER_NOT_AUTHORISED
        when: prescriber_id is not authorised to act on this case.
      - code: INVALID_TIER_CODE
        when: applied_tier_code is not declared in BNK.RLVR.CAP.REF.001.TIE.
      - code: OVERRIDE_ALREADY_ACTIVE
        when: An active override already exists on the case — close it first.
    idempotency:
      key: override_id          # caller-supplied UUID — replay-safe across the bus
      window: 30d
    api_binding: { method: POST, path: /cases/{case_id}/overrides }

  - id: CMD.BSP.001.TIE.CONFIRM_PRESCRIBER_OVERRIDE
    name: Confirm a prescriber override after arbitration validation
    intent: >-
      Mark the active override as CONFIRMED_BY_ARBITRATION when BNK.RLVR.CAP.BSP.001.ARB
      emits an arbitration-validated event. The override remains in force; the
      algorithmic resumption is still gated until ARB emits a closure event.
      No bus event is emitted by TIE — the arbitration validation itself is
      already published by ARB.
    accepted_by: AGG.BSP.001.TIE.TIER_OF_CASE
    issued_by:
      - POL.BSP.001.TIE.ON_ARBITRATION_OVERRIDE_VALIDATED
    payload_schema: schemas/CMD.BSP.001.TIE.CONFIRM_PRESCRIBER_OVERRIDE.schema.json
    preconditions:
      - id: PRE.001
        rule: An active override exists for case_id with override_id matching the trigger.
      - id: PRE.002
        rule: trigger.event_id has not already been processed.
    invariants_enforced:
      - INV.TIE.004
    emits: []   # silent state transition — ARB already published the validation
    errors:
      - code: NO_ACTIVE_OVERRIDE
        when: No active override exists for case_id.
      - code: OVERRIDE_ID_MISMATCH
        when: override_id does not match the active override on the case.
      - code: TRIGGER_ALREADY_PROCESSED
        when: trigger.event_id has previously been applied.
    idempotency:
      key: trigger.event_id
      window: 30d
    api_binding: null   # internal-only; not exposed on REST

  - id: CMD.BSP.001.TIE.CLOSE_PRESCRIBER_OVERRIDE
    name: Close a prescriber override and resume algorithmic control
    intent: >-
      Clear the active override following an arbitration-algorithm-reaffirmed
      event from BNK.RLVR.CAP.BSP.001.ARB. If the algorithm-resolved tier (computed
      from the latest known score and the current tier-definition snapshot)
      differs from the override-applied tier, atomically emit the corresponding
      transition event so consumers see the realignment. Otherwise the closure
      is silent (no transition event).
    accepted_by: AGG.BSP.001.TIE.TIER_OF_CASE
    issued_by:
      - POL.BSP.001.TIE.ON_ARBITRATION_ALGORITHM_REAFFIRMED
    payload_schema: schemas/CMD.BSP.001.TIE.CLOSE_PRESCRIBER_OVERRIDE.schema.json
    preconditions:
      - id: PRE.001
        rule: An active override exists for case_id with override_id matching the trigger.
      - id: PRE.002
        rule: trigger.event_id has not already been processed.
    invariants_enforced:
      - INV.TIE.001
      - INV.TIE.004
      - INV.TIE.005
    emits:
      # Conditional — only when the algorithm-resolved tier differs from the
      # override-applied tier. Exactly one of the following is emitted, or none.
      - BNK.RLVR.RVT.BSP.001.TIER_UPGRADE_RECORDED        # if algorithmic tier > override tier
      - BNK.RLVR.RVT.BSP.001.TIER_DOWNGRADE_RECORDED      # if algorithmic tier < override tier
    errors:
      - code: NO_ACTIVE_OVERRIDE
        when: No active override exists for case_id.
      - code: OVERRIDE_ID_MISMATCH
        when: override_id does not match the active override on the case.
      - code: TRIGGER_ALREADY_PROCESSED
        when: trigger.event_id has previously been applied.
    idempotency:
      key: trigger.event_id
      window: 30d
    api_binding: null   # internal-only; not exposed on REST

# ──────────────────────────────────────────────────────────────
# Transition-direction discriminator — kept here so that the
# command schema, the aggregate handler, and the policy mapping
# all type-check against the same enum.
# ──────────────────────────────────────────────────────────────

transition_directions:
  - id: UPGRADE
    semantics: target tier strictly above source tier in BNK.RLVR.CAP.REF.001.TIE ordering.
    emits: BNK.RLVR.RVT.BSP.001.TIER_UPGRADE_RECORDED
    paired_business_event: BNK.RLVR.EVT.BSP.001.TIER_UPGRADED
  - id: DOWNGRADE
    semantics: target tier strictly below source tier in BNK.RLVR.CAP.REF.001.TIE ordering.
    emits: BNK.RLVR.RVT.BSP.001.TIER_DOWNGRADE_RECORDED
    paired_business_event: BNK.RLVR.EVT.BSP.001.TIER_DOWNGRADED
