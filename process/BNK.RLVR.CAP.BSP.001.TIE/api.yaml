meta:
  capability: BNK.RLVR.CAP.BSP.001.TIE
  layer: process-modelling
  version: 0.1.0
  derivation: >-
    This file is the synthesised HTTP/RPC surface of BNK.RLVR.CAP.BSP.001.TIE. It is
    DERIVED from commands.yaml + read-models.yaml — the api_binding fields
    declared there. Keep in sync; the BFF/microservice scaffolding agents
    consume this view, not the raw command/query files. CMDs whose
    api_binding is null (CONFIRM_PRESCRIBER_OVERRIDE,
    CLOSE_PRESCRIBER_OVERRIDE) are intentionally not exposed on REST —
    they are issued exclusively by internal policies reacting to ARB events.

api:
  base_path: /capabilities/bsp/001/tie
  authentication: bearer-token (sourced from BNK.RLVR.CAP.SUP.001 — out of scope here)

  # ── Command endpoints (state-mutating) ──
  commands:
    - operation_id: applyTierTransition
      method: POST
      path: /cases/{case_id}/tier-transitions
      issues: CMD.BSP.001.TIE.APPLY_TIER_TRANSITION
      request_schema: schemas/CMD.BSP.001.TIE.APPLY_TIER_TRANSITION.schema.json
      responses:
        202: { description: Transition accepted (async; bus carries the outcome) }
        404: { description: BENEFICIARY_UNKNOWN }
        409: { description: OVERRIDE_IN_FORCE — algorithmic transitions suspended }
        422: { description: INVALID_TIER_CODE | TRIGGER_DIRECTION_MISMATCH }
        200: { description: TRIGGER_ALREADY_PROCESSED — idempotent no-op }
      note: >-
        This endpoint exists primarily for back-channel triggers and tests.
        The canonical flow is event-driven via
        POL.ON_SCORE_THRESHOLD_REACHED on BNK.RLVR.RVT.SCORE_THRESHOLD_REACHED.

    - operation_id: applyPrescriberOverride
      method: POST
      path: /cases/{case_id}/overrides
      issues: CMD.BSP.001.TIE.APPLY_PRESCRIBER_OVERRIDE
      request_schema: schemas/CMD.BSP.001.TIE.APPLY_PRESCRIBER_OVERRIDE.schema.json
      responses:
        201: { description: Override activated; body mirrors BNK.RLVR.RVT.OVERRIDE_ACTIVATED }
        404: { description: BENEFICIARY_UNKNOWN }
        403: { description: PRESCRIBER_NOT_AUTHORISED }
        409: { description: OVERRIDE_ALREADY_ACTIVE }
        422: { description: INVALID_TIER_CODE }
      note: >-
        Issued by BNK.RLVR.CAP.CHN.002.VUE on prescriber action. The override is
        durable — it remains in force until ARB closes it via the
        OVERRIDE_CLOSED event.

  # ── Query endpoints (read-only) ──
  queries:
    - operation_id: getCurrentTier
      method: GET
      path: /cases/{case_id}/tier
      serves: QRY.BSP.001.TIE.GET_CURRENT_TIER
      cache: { etag: true, max_age: PT5S }
      responses:
        200: { description: Current tier view (with optional active override summary) }
        404: { description: case_id unknown to BNK.RLVR.CAP.REF.001.BEN }
      note: >-
        Returns the entry tier from BNK.RLVR.CAP.REF.001.TIE when no transition has
        been recorded yet — never 404s for a case that exists in the
        beneficiary referential.

    - operation_id: listTierHistory
      method: GET
      path: /cases/{case_id}/tier-history
      serves: QRY.BSP.001.TIE.LIST_TIER_HISTORY
      query_params:
        - { name: since, in: query, type: date, optional: true }
        - { name: limit, in: query, type: integer, default: 50, max: 500 }
      responses:
        200: { description: Tier transition history (chronological) }
        404: { description: case_id unknown to BNK.RLVR.CAP.REF.001.BEN }
