meta:
  capability: BNK.RLVR.CAP.SUP.002.BEN
  layer: process-modelling
  version: 0.2.0
  governing_adrs:
    - ADR-TECH-STRAT-001  # Dual-rail event infrastructure — NORMATIVE
    - ADR-TECH-STRAT-003  # API contract strategy — JWT-borne actor sourced into envelope.actor
    - ADR-TECH-STRAT-004  # dual-referential-access — bus replication is one of the two access paths
    - ADR-TECH-STRAT-007  # internal_id (UUIDv7) is the correlation key
    - ADR-TECH-STRAT-008  # information publication model — capability as multi-faceted producer

# ──────────────────────────────────────────────────────────────
# Bus topology — the operational rail (RabbitMQ topic exchange)
# owned by this capability. Per ADR-TECH-STRAT-004 the bus is
# the canonical replication path for downstream local-cache
# hydration; the QRY API (read-models.yaml) is the secondary
# (synchronous) access path.
#
# Per ADR-TECH-STRAT-008 the capability is a multi-faceted
# information producer — the operational rail (RabbitMQ topic
# below) is the OPERATIONAL face of the public information
# product; the analytical rail (Kafka, downstream data-mesh)
# ingests the same stream. The REST QRY API completes the
# producer-sovereignty contract.
# ──────────────────────────────────────────────────────────────

publication:
  broker: rabbitmq
  exchange:
    name: sup.002.ben-events
    type: topic
    durable: true
    owned_by: BNK.RLVR.CAP.SUP.002.BEN
    rule_reference: ADR-TECH-STRAT-001 Rules 1, 5

  # Per ADR-TECH-STRAT-001 Rule 2, only resource events generate autonomous
  # bus messages. Business events appear ONLY as the prefix of the routing
  # key (Rule 4) — never as standalone messages.
  #
  # Single emitted resource event family — every transition (MINT / UPDATE
  # / ARCHIVE / RESTORE / PSEUDONYMISE) emits the SAME RVT, with the kind
  # of transition discriminated by the payload's `transition_kind` field.
  # This keeps consumer subscriptions simple (one binding per consumer)
  # and matches the ECST (entity-change-state-tracking) pattern called out
  # in ADR-TECH-STRAT-008.

  routing_keys:
    - resource_event: BNK.RLVR.RVT.SUP.002.BENEFICIARY_ANCHOR_UPDATED
      paired_business_event: BNK.RLVR.EVT.SUP.002.BENEFICIARY_ANCHOR_UPDATED
      routing_key: BNK.RLVR.EVT.SUP.002.BENEFICIARY_ANCHOR_UPDATED.BNK.RLVR.RVT.SUP.002.BENEFICIARY_ANCHOR_UPDATED
      schema: schemas/BNK.RLVR.RVT.SUP.002.BENEFICIARY_ANCHOR_UPDATED.schema.json
      payload_form: domain-event-ddd
      note: >-
        Carries the full post-transition snapshot plus the monotonic
        `revision` and the `transition_kind` discriminator (see INV.BEN.007).
        For PSEUDONYMISED transitions, the four PII fields are crypto-shredded
        null markers — consumers MUST wipe their local cache for that
        internal_id while preserving the internal_id reference itself.

  envelope:
    # The exact shape lives in schemas/BNK.RLVR.RVT.SUP.002.BENEFICIARY_ANCHOR_UPDATED.schema.json
    # ($defs.Envelope). This block declares the agreed envelope fields at the
    # process layer so reviewers see the full bus contract in one place.
    message_id_kind:    uuidv7      # per ADR-TECH-STRAT-007 Rule 4
    correlation_id_kind: uuidv7     # set to internal_id for anchor-scoped events
    causation_id_kind:  uuidv7      # set to command_id of the accepted command
    schema_version_kind: semver
    actor:                          # added v0.2.0 — sourced into PRJ.ANCHOR_HISTORY.actor
      shape: { kind: enum[human, service, system], subject: string, on_behalf_of: optional string }
      source: >-
        Derived at the producer from the authentication context per
        ADR-TECH-STRAT-003. JWT `sub` claim for human actors; service
        principal (= capability id) for service-to-service; a stable
        `system:*` token for outbox replay / scheduled jobs.

  correlation_key: internal_id
  identity_resolution: >-
    THIS capability IS the canonical resolver. The internal_id (UUIDv7) IS
    the canonical reference per ADR-TECH-STRAT-007 Rule 7.a (immutable
    anchor). No upstream lookup is needed; downstream consumers use the
    value carried on the wire as the master key for their own caches.

# ──────────────────────────────────────────────────────────────
# Subscription side — events consumed from upstream capabilities.
#
# BNK.RLVR.CAP.SUP.002.BEN has NO subscriptions in v1. The BCM corpus
# declares zero consumed_business_events / consumed_resource_events
# for this capability. ADR-BCM-FUNC-0016 documents the INTENT
# to subscribe to RightExercised.Processed from BNK.RLVR.CAP.SUP.001.RET
# (Beneficiary Rights) so that PSEUDONYMISE_ANCHOR can be issued
# reactively, but that consumed event chain has not yet been
# declared upstream — see Open Question #1 in aggregates.yaml
# and the placeholder policy block in policies.yaml.
#
# Until then PSEUDONYMISE_ANCHOR is HTTP-only — issued by an
# admin tool or by BNK.RLVR.CAP.SUP.001.RET via REST.
# ──────────────────────────────────────────────────────────────

subscriptions: []

# ──────────────────────────────────────────────────────────────
# Known / anticipated consumers of THIS capability's events.
#
# Per ADR-TECH-STRAT-004's dual-referential-access rule, every
# capability that needs the canonical beneficiary identity should
# either (a) maintain a local cache fed by this exchange OR
# (b) call QRY.GET_ANCHOR synchronously. The bus path is the
# canonical replication path.
#
# Each entry is flagged `evidenced_by`:
#   prior-process-model — a process/BNK.RLVR.CAP.*.*/bus.yaml on main
#     names this capability as its identity resolver;
#   anticipated         — derived from ADR-BCM-FUNC-0016 +
#     CPT.BCM.000.BENEFICIARY scope; not yet confirmed by a
#     downstream process model.
# ──────────────────────────────────────────────────────────────

consumers:
  - capability: BNK.RLVR.CAP.BSP.001.SCO
    binds_to:
      - BNK.RLVR.EVT.SUP.002.BENEFICIARY_ANCHOR_UPDATED.#
    rationale: >-
      Behavioural scoring needs canonical identity; the SCO model defers
      internal_id resolution to this capability (see
      process/BNK.RLVR.CAP.BSP.001.SCO/bus.yaml.identity_resolution — currently
      points at the old BNK.RLVR.CAP.REF.001.BEN; will need updating after this PR
      merges).
    evidenced_by: prior-process-model
    migration_note: >-
      The SCO bus.yaml currently binds on BNK.RLVR.EVT.REF.001.BENEFICIARY_REFERENTIAL_UPDATED.#
      and must be re-pointed at BNK.RLVR.EVT.SUP.002.BENEFICIARY_ANCHOR_UPDATED.#
      via /process BNK.RLVR.CAP.BSP.001.SCO once this PR is merged.

  - capability: BNK.RLVR.CAP.BSP.002.ENR
    binds_to:
      - BNK.RLVR.EVT.SUP.002.BENEFICIARY_ANCHOR_UPDATED.#
    rationale: >-
      Enrolment is the most likely upstream caller of MINT_ANCHOR. It
      opens the participation case keyed on internal_id and must observe
      identity changes (PII updates, pseudonymisation) for the duration
      of the case.
    evidenced_by: anticipated

  - capability: BNK.RLVR.CAP.BSP.004.ENV
    binds_to:
      - BNK.RLVR.EVT.SUP.002.BENEFICIARY_ANCHOR_UPDATED.#
    rationale: >-
      Budget envelopes use case_id but anchor identity resolution to this
      capability (see process/BNK.RLVR.CAP.BSP.004.ENV/bus.yaml.identity_resolution).
    evidenced_by: prior-process-model
    migration_note: >-
      Same as BNK.RLVR.CAP.BSP.001.SCO above — binding pattern must be re-pointed.

  - capability: BNK.RLVR.CAP.CHN.001.DSH
    binds_to:
      - BNK.RLVR.EVT.SUP.002.BENEFICIARY_ANCHOR_UPDATED.#
    rationale: Beneficiary dashboard renders names and contact details.
    evidenced_by: anticipated

  - capability: BNK.RLVR.CAP.CHN.002.VIE
    binds_to:
      - BNK.RLVR.EVT.SUP.002.BENEFICIARY_ANCHOR_UPDATED.#
    rationale: Prescriber view — names of supervised beneficiaries.
    evidenced_by: anticipated

  - capability: BNK.RLVR.CAP.B2B.001.FLW
    binds_to:
      - BNK.RLVR.EVT.SUP.002.BENEFICIARY_ANCHOR_UPDATED.#
    rationale: >-
      Card-funding capability — needs canonical identity for KYC handover
      to the partner bank.
    evidenced_by: anticipated

  - capability: BNK.RLVR.CAP.SUP.001.AUD
    binds_to:
      - BNK.RLVR.EVT.SUP.002.BENEFICIARY_ANCHOR_UPDATED.#
    rationale: >-
      Audit & Traceability needs the complete anchor lifecycle, including
      PSEUDONYMISED transitions (proof of GDPR Art. 17 fulfilment).
    evidenced_by: anticipated

  - capability: BNK.RLVR.CAP.SUP.001.RET
    binds_to:
      - BNK.RLVR.EVT.SUP.002.BENEFICIARY_ANCHOR_UPDATED.#
    rationale: >-
      Beneficiary Rights observes the PSEUDONYMISED transition to close
      the right-to-be-forgotten request loop and notify the data subject.
    evidenced_by: anticipated

  - capability: BNK.RLVR.CAP.DAT.*   # data-analytics zone, exact L2 ids TBD
    binds_to:
      - BNK.RLVR.EVT.SUP.002.BENEFICIARY_ANCHOR_UPDATED.#
    rationale: >-
      Per ADR-TECH-STRAT-001 + ADR-TECH-STRAT-008, the analytical rail
      (Kafka / data-mesh) ingests the operational stream for downstream
      BI and signal mining. PSEUDONYMISED events drive purge of
      analytical projections too.
    evidenced_by: anticipated
