meta:
  capability: BNK.RLVR.CAP.SUP.002.BEN
  layer: process-modelling
  version: 0.1.0
  derivation: >-
    Synthesised from commands.yaml.commands[].api_binding and
    read-models.yaml.queries[].api_binding. Do not author REST endpoints
    here directly — author them in commands.yaml / read-models.yaml and let
    /process re-derive this file. The implement-capability(-python) and
    create-bff agents consume this single file rather than cross-walking
    two.
  governing_adrs:
    - ADR-TECH-STRAT-003  # API contract strategy — REST/HTTP
    - ADR-TECH-STRAT-008  # information publication model — REST is one of the two access paths
    - ADR-TECH-TACT-002   # tactical stack — Python / FastAPI

# ──────────────────────────────────────────────────────────────
# REST API surface — the synchronous face of the capability.
# Path prefix is implicit (/anchors); the BFF / API gateway is
# responsible for routing /sup/002/ben/anchors/* to this service.
# All requests and responses are JSON; payload schemas live under
# schemas/.
# ──────────────────────────────────────────────────────────────

operations:

  # ─── Commands ─────────────────────────────────────────────

  - operation_id: mintAnchor
    method: POST
    path: /anchors
    issues: CMD.SUP.002.BEN.MINT_ANCHOR
    request_schema: schemas/CMD.SUP.002.BEN.MINT_ANCHOR.schema.json
    responses:
      "201":
        description: Anchor minted; returns the canonical record.
        body_shape: BeneficiaryAnchor
      "200":
        description: Idempotent re-call (REQUEST_ALREADY_PROCESSED) — returns the existing anchor.
        body_shape: BeneficiaryAnchor
      "400":
        description: IDENTITY_FIELDS_MISSING.

  - operation_id: updateAnchor
    method: PATCH
    path: /anchors/{internal_id}
    issues: CMD.SUP.002.BEN.UPDATE_ANCHOR
    request_schema: schemas/CMD.SUP.002.BEN.UPDATE_ANCHOR.schema.json
    responses:
      "200":
        description: Update applied (or idempotent COMMAND_ALREADY_PROCESSED) — returns the post-transition anchor.
        body_shape: BeneficiaryAnchor
      "400":
        description: NO_FIELDS_TO_UPDATE.
      "404":
        description: ANCHOR_NOT_FOUND.
      "409":
        description: ANCHOR_ARCHIVED or ANCHOR_PSEUDONYMISED.

  - operation_id: archiveAnchor
    method: POST
    path: /anchors/{internal_id}/archive
    issues: CMD.SUP.002.BEN.ARCHIVE_ANCHOR
    request_schema: schemas/CMD.SUP.002.BEN.ARCHIVE_ANCHOR.schema.json
    responses:
      "200":
        description: Archived (or idempotent COMMAND_ALREADY_PROCESSED) — returns the post-transition anchor.
        body_shape: BeneficiaryAnchor
      "404":
        description: ANCHOR_NOT_FOUND.
      "409":
        description: ANCHOR_ALREADY_ARCHIVED or ANCHOR_PSEUDONYMISED.

  - operation_id: restoreAnchor
    method: POST
    path: /anchors/{internal_id}/restore
    issues: CMD.SUP.002.BEN.RESTORE_ANCHOR
    request_schema: schemas/CMD.SUP.002.BEN.RESTORE_ANCHOR.schema.json
    responses:
      "200":
        description: Restored (or idempotent COMMAND_ALREADY_PROCESSED) — returns the post-transition anchor.
        body_shape: BeneficiaryAnchor
      "404":
        description: ANCHOR_NOT_FOUND.
      "409":
        description: ANCHOR_NOT_ARCHIVED or ANCHOR_PSEUDONYMISED.

  - operation_id: pseudonymiseAnchor
    method: POST
    path: /anchors/{internal_id}/pseudonymise
    issues: CMD.SUP.002.BEN.PSEUDONYMISE_ANCHOR
    request_schema: schemas/CMD.SUP.002.BEN.PSEUDONYMISE_ANCHOR.schema.json
    responses:
      "200":
        description: Pseudonymised (or idempotent COMMAND_ALREADY_PROCESSED) — returns the post-transition anchor with PII fields nulled.
        body_shape: BeneficiaryAnchor
      "400":
        description: RIGHT_EXERCISE_ID_INVALID.
      "404":
        description: ANCHOR_NOT_FOUND.
      "409":
        description: ANCHOR_ALREADY_PSEUDONYMISED.

  # ─── Queries ──────────────────────────────────────────────

  - operation_id: getAnchor
    method: GET
    path: /anchors/{internal_id}
    serves: QRY.SUP.002.BEN.GET_ANCHOR
    cache:
      etag: true
      max_age_seconds: 60
    responses:
      "200":
        description: Anchor record. PII fields are null when anchor_status is PSEUDONYMISED.
        body_shape: BeneficiaryAnchor
      "304":
        description: ETag match — body omitted.
      "404":
        description: ANCHOR_NOT_FOUND.

  - operation_id: getAnchorHistory
    method: GET
    path: /anchors/{internal_id}/history
    serves: QRY.SUP.002.BEN.GET_ANCHOR_HISTORY
    query_params:
      - { name: since_revision, type: integer, required: false }
    cache:
      etag: true
      max_age_seconds: 0
    responses:
      "200":
        description: Ordered list of anchor transitions (PII-free).
        body_shape: AnchorHistory
      "304":
        description: ETag match — body omitted.
      "404":
        description: ANCHOR_NOT_FOUND.
