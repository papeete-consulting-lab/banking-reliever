meta:
  capability: BNK.RLVR.CAP.SUP.002.BEN
  layer: process-modelling
  version: 0.1.0
  governing_adrs:
    - ADR-BCM-FUNC-0016   # L2 Beneficiary Identity Anchor
    - ADR-BCM-URBA-0009
    - ADR-TECH-STRAT-004  # PII governance
    - ADR-TECH-STRAT-007  # UUIDv7, idempotency-as-identifier
    - ADR-TECH-STRAT-008  # publication model — REST is one of the two access paths
    - ADR-TECH-TACT-002   # Python / FastAPI — accepted commands map to FastAPI routes

# ──────────────────────────────────────────────────────────────
# Commands — verbs this capability accepts. Each CMD is the unit
# a client (HTTP API caller — there are no in-process policies on
# this capability for v1; see policies.yaml for the rationale)
# issues to request a state transition. A CMD is always handled
# by exactly one aggregate, and emits zero or more domain events.
# Identifier: CMD.<ZONE>.<L1>.<L2>.<VERB>
#
# All five commands emit the SAME resource event family
# (BNK.RLVR.RVT.SUP.002.BENEFICIARY_ANCHOR_UPDATED) — the kind of
# transition is discriminated by the payload's `transition_kind`
# field (MINTED | UPDATED | ARCHIVED | RESTORED | PSEUDONYMISED).
# Consumers subscribe once to the event family and route on the
# discriminator (per ADR-TECH-STRAT-008 ECST pattern).
# ──────────────────────────────────────────────────────────────

commands:

  - id: CMD.SUP.002.BEN.MINT_ANCHOR
    name: Mint a new beneficiary identity anchor
    intent: >-
      Create a new identity anchor for a beneficiary. The aggregate mints a
      UUIDv7 internal_id (per ADR-TECH-STRAT-007) and returns it; downstream
      capabilities key all future references on that internal_id. The caller
      supplies the natural identity (names, date of birth, contact details)
      and a UUIDv7 client_request_id for idempotency. No caller-supplied
      identifier is accepted on the request (see Open Question #2 in
      aggregates.yaml).
    accepted_by: AGG.SUP.002.BEN.IDENTITY_ANCHOR
    issued_by:
      - http-api-caller   # typically BNK.RLVR.CAP.BSP.002.ENR (Enrolment) or admin tooling
    payload_schema: schemas/CMD.SUP.002.BEN.MINT_ANCHOR.schema.json
    preconditions:
      - id: PRE.001
        rule: client_request_id has not been processed before within the 30-day window.
      - id: PRE.002
        rule: Required identity fields are present (last_name, first_name, date_of_birth).
    invariants_enforced:
      - INV.BEN.001
      - INV.BEN.002
      - INV.BEN.007
      - INV.BEN.008
    emits:
      - BNK.RLVR.RVT.SUP.002.BENEFICIARY_ANCHOR_UPDATED  # transition_kind: MINTED
      # business-event family pivot (no autonomous bus message — Rule 2 of ADR-TECH-STRAT-001):
      # BNK.RLVR.EVT.SUP.002.BENEFICIARY_ANCHOR_UPDATED
    errors:
      - code: REQUEST_ALREADY_PROCESSED
        when: client_request_id has been previously applied — returns the prior internal_id (200 OK) rather than 409.
      - code: IDENTITY_FIELDS_MISSING
        when: One of last_name, first_name, date_of_birth is missing or empty.
    idempotency:
      key: client_request_id
      window: 30d
      kind: caller-supplied-uuidv7
    api_binding: { method: POST, path: /anchors }

  - id: CMD.SUP.002.BEN.UPDATE_ANCHOR
    name: Update the PII fields of an identity anchor
    intent: >-
      Apply a partial update to a beneficiary's anchor PII — typically
      contact details, occasionally name corrections (legal change). The
      payload carries only the fields to mutate; absent fields are left
      unchanged (sticky-PII rule, INV.BEN.003). PII destruction must NOT
      flow through this command — use PSEUDONYMISE_ANCHOR.
    accepted_by: AGG.SUP.002.BEN.IDENTITY_ANCHOR
    issued_by:
      - http-api-caller
    payload_schema: schemas/CMD.SUP.002.BEN.UPDATE_ANCHOR.schema.json
    preconditions:
      - id: PRE.001
        rule: An anchor exists for the given internal_id.
      - id: PRE.002
        rule: anchor_status is ACTIVE.
      - id: PRE.003
        rule: command_id has not been processed before (idempotency).
    invariants_enforced:
      - INV.BEN.002
      - INV.BEN.003
      - INV.BEN.007
      - INV.BEN.008
    emits:
      - BNK.RLVR.RVT.SUP.002.BENEFICIARY_ANCHOR_UPDATED  # transition_kind: UPDATED
    errors:
      - code: ANCHOR_NOT_FOUND
        when: No anchor matches the given internal_id.
      - code: ANCHOR_ARCHIVED
        when: anchor_status is ARCHIVED — RESTORE first.
      - code: ANCHOR_PSEUDONYMISED
        when: anchor_status is PSEUDONYMISED — irreversible terminal state.
      - code: COMMAND_ALREADY_PROCESSED
        when: command_id has been previously applied (idempotent — returns the prior result).
      - code: NO_FIELDS_TO_UPDATE
        when: The payload carries no mutable fields.
    idempotency:
      key: command_id
      window: 30d
    api_binding: { method: PATCH, path: /anchors/{internal_id} }

  - id: CMD.SUP.002.BEN.ARCHIVE_ANCHOR
    name: Archive a beneficiary identity anchor
    intent: >-
      Flip anchor_status from ACTIVE to ARCHIVED — typically on programme
      exit (success, dropout, transfer to standard banking). The anchor
      remains queryable so historical references resolve, but no further
      UPDATE is accepted until RESTORE is issued.
    accepted_by: AGG.SUP.002.BEN.IDENTITY_ANCHOR
    issued_by:
      - http-api-caller
    payload_schema: schemas/CMD.SUP.002.BEN.ARCHIVE_ANCHOR.schema.json
    preconditions:
      - id: PRE.001
        rule: An anchor exists for the given internal_id.
      - id: PRE.002
        rule: anchor_status is ACTIVE.
      - id: PRE.003
        rule: command_id has not been processed before.
    invariants_enforced:
      - INV.BEN.002
      - INV.BEN.004
      - INV.BEN.007
      - INV.BEN.008
    emits:
      - BNK.RLVR.RVT.SUP.002.BENEFICIARY_ANCHOR_UPDATED  # transition_kind: ARCHIVED
    errors:
      - code: ANCHOR_NOT_FOUND
        when: No anchor matches the given internal_id.
      - code: ANCHOR_ALREADY_ARCHIVED
        when: anchor_status is already ARCHIVED.
      - code: ANCHOR_PSEUDONYMISED
        when: anchor_status is PSEUDONYMISED — terminal state, archival is irrelevant.
      - code: COMMAND_ALREADY_PROCESSED
        when: command_id has been previously applied.
    idempotency:
      key: command_id
      window: 30d
    api_binding: { method: POST, path: /anchors/{internal_id}/archive }

  - id: CMD.SUP.002.BEN.RESTORE_ANCHOR
    name: Restore an archived identity anchor
    intent: >-
      Flip anchor_status from ARCHIVED back to ACTIVE. Rare audited
      operation — typically reverses an archival applied in error. Does NOT
      mutate identity fields; if those need correction, follow with an
      UPDATE.
    accepted_by: AGG.SUP.002.BEN.IDENTITY_ANCHOR
    issued_by:
      - http-api-caller
    payload_schema: schemas/CMD.SUP.002.BEN.RESTORE_ANCHOR.schema.json
    preconditions:
      - id: PRE.001
        rule: An anchor exists for the given internal_id.
      - id: PRE.002
        rule: anchor_status is ARCHIVED.
      - id: PRE.003
        rule: command_id has not been processed before.
    invariants_enforced:
      - INV.BEN.002
      - INV.BEN.005
      - INV.BEN.007
      - INV.BEN.008
    emits:
      - BNK.RLVR.RVT.SUP.002.BENEFICIARY_ANCHOR_UPDATED  # transition_kind: RESTORED
    errors:
      - code: ANCHOR_NOT_FOUND
        when: No anchor matches the given internal_id.
      - code: ANCHOR_NOT_ARCHIVED
        when: anchor_status is ACTIVE — nothing to restore.
      - code: ANCHOR_PSEUDONYMISED
        when: anchor_status is PSEUDONYMISED — terminal, irreversible.
      - code: COMMAND_ALREADY_PROCESSED
        when: command_id has been previously applied.
    idempotency:
      key: command_id
      window: 30d
    api_binding: { method: POST, path: /anchors/{internal_id}/restore }

  - id: CMD.SUP.002.BEN.PSEUDONYMISE_ANCHOR
    name: Pseudonymise an anchor (GDPR Art. 17 erasure)
    intent: >-
      Execute the GDPR Art. 17 right-to-be-forgotten on a beneficiary's
      anchor. Crypto-shreds the four PII fields (last_name, first_name,
      date_of_birth, contact_details) so they are not recoverable, sets
      anchor_status to PSEUDONYMISED and pseudonymized_at to NOW(). The
      internal_id is preserved so foreign-key integrity at downstream
      consumers is not broken — only the PII is destroyed. Irreversible.
      The command carries a `right_exercise_id` linking it to the upstream
      right-to-be-forgotten request from BNK.RLVR.CAP.SUP.001.RET (today supplied
      by the HTTP caller; see Open Question #1 in aggregates.yaml for the
      future event-driven path).
    accepted_by: AGG.SUP.002.BEN.IDENTITY_ANCHOR
    issued_by:
      - http-api-caller   # typically BNK.RLVR.CAP.SUP.001.RET via REST, or DPO admin tooling
    payload_schema: schemas/CMD.SUP.002.BEN.PSEUDONYMISE_ANCHOR.schema.json
    preconditions:
      - id: PRE.001
        rule: An anchor exists for the given internal_id.
      - id: PRE.002
        rule: anchor_status is ACTIVE or ARCHIVED (not already PSEUDONYMISED).
      - id: PRE.003
        rule: command_id has not been processed before.
      - id: PRE.004
        rule: right_exercise_id is a UUIDv7 referencing an upstream right-to-be-forgotten request.
    invariants_enforced:
      - INV.BEN.002
      - INV.BEN.006
      - INV.BEN.007
      - INV.BEN.008
    emits:
      - BNK.RLVR.RVT.SUP.002.BENEFICIARY_ANCHOR_UPDATED  # transition_kind: PSEUDONYMISED
    errors:
      - code: ANCHOR_NOT_FOUND
        when: No anchor matches the given internal_id.
      - code: ANCHOR_ALREADY_PSEUDONYMISED
        when: anchor_status is already PSEUDONYMISED — operation is irreversible and cannot be re-applied.
      - code: COMMAND_ALREADY_PROCESSED
        when: command_id has been previously applied (returns the prior result).
      - code: RIGHT_EXERCISE_ID_INVALID
        when: right_exercise_id is missing or not a valid UUIDv7.
    idempotency:
      key: command_id
      window: 30d
    api_binding: { method: POST, path: /anchors/{internal_id}/pseudonymise }

# ──────────────────────────────────────────────────────────────
# Transition kinds — discriminator for the single emitted BNK.RLVR.RVT.
# Kept here so consumers and the schema can be type-checked
# against the same enum.
# ──────────────────────────────────────────────────────────────

transition_kinds:
  - id: MINTED
    emitting_command: CMD.SUP.002.BEN.MINT_ANCHOR
  - id: UPDATED
    emitting_command: CMD.SUP.002.BEN.UPDATE_ANCHOR
  - id: ARCHIVED
    emitting_command: CMD.SUP.002.BEN.ARCHIVE_ANCHOR
  - id: RESTORED
    emitting_command: CMD.SUP.002.BEN.RESTORE_ANCHOR
  - id: PSEUDONYMISED
    emitting_command: CMD.SUP.002.BEN.PSEUDONYMISE_ANCHOR
