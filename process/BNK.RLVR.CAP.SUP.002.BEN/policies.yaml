meta:
  capability: BNK.RLVR.CAP.SUP.002.BEN
  layer: process-modelling
  version: 0.1.0
  governing_adrs:
    - ADR-BCM-FUNC-0016
    - ADR-TECH-STRAT-001  # Rule 4 — bus topology / subscription form

# ──────────────────────────────────────────────────────────────
# Policies — reactive bridges that listen to (resource) events
# and issue commands on this capability's aggregates. Aggregates
# never subscribe to events directly; policies do.
#
# BNK.RLVR.CAP.SUP.002.BEN's BCM corpus declares ZERO consumed events
# (consumed_business_events / consumed_resource_events slices
# are both empty in `bcm-pack pack BNK.RLVR.CAP.SUP.002.BEN --deep`).
# This is intentional for v1 of the model: the capability is
# still the canonical golden record for beneficiary identity
# (per ADR-BCM-FUNC-0016 — same source-of-truth pattern as the
# prior BNK.RLVR.CAP.REF.001.BEN), and every transition is initiated by
# a direct API call.
#
# ADR-BCM-FUNC-0016 documents the INTENT to subscribe to
# RightExercised.Processed from BNK.RLVR.CAP.SUP.001.RET (Beneficiary
# Rights) so that PSEUDONYMISE_ANCHOR can be issued reactively
# rather than via REST. That subscription is NOT yet declared
# in the BCM, so the policy is intentionally absent from v1 —
# see Open Question #1 in aggregates.yaml. When the BCM grows
# the consumed event chain, /process BNK.RLVR.CAP.SUP.002.BEN must be
# re-run to add:
#
#   - id: POL.SUP.002.BEN.ON_RIGHT_EXERCISED
#     listens_to:
#       - resource_event: BNK.RLVR.RVT.SUP.001.RET.RIGHT_EXERCISED  # placeholder name
#     issues: CMD.SUP.002.BEN.PSEUDONYMISE_ANCHOR
#     mapping_rule: |
#       internal_id        ← payload.beneficiary_internal_id
#       right_exercise_id  ← payload.right_exercise_id
#       command_id         ← deterministic-uuidv7(envelope.message_id)
#       reason             ← payload.reason
#     error_handling:
#       ANCHOR_ALREADY_PSEUDONYMISED: ack-and-drop  # idempotent terminal
#       ANCHOR_NOT_FOUND:             dlq           # data-quality issue
#       COMMAND_ALREADY_PROCESSED:    ack-and-drop  # at-least-once redelivery
#     delivery: at-least-once
#
# Until then, this file stays empty — and the FastAPI surface
# (CMD.PSEUDONYMISE_ANCHOR via POST /anchors/{internal_id}/pseudonymise)
# is the only legitimate trigger.
# ──────────────────────────────────────────────────────────────

policies: []
