meta:
  capability: BNK.RLVR.CAP.SUP.002.BEN
  layer: process-modelling
  version: 0.2.0
  governing_adrs:
    - ADR-BCM-FUNC-0016
    - ADR-TECH-STRAT-003  # API contract strategy — JWT-borne actor (envelope.actor sourced from `sub` claim)
    - ADR-TECH-STRAT-004  # dual referential access — the QRY API is the synchronous access path
    - ADR-TECH-STRAT-007  # internal_id (UUIDv7) is the sole lookup key
    - ADR-TECH-STRAT-008  # publication model — REST is one of the two access paths

# ──────────────────────────────────────────────────────────────
# Read-models — projections of the aggregate's emitted events.
# Each projection backs one or more queries (QRY.*). Projections
# are ALWAYS eventually-consistent (per ADR-TECH-STRAT-004) — a
# QRY served immediately after a CMD may not yet observe the
# transition, and the contract makes that explicit.
#
# Two projections for v1:
#   PRJ.SUP.002.BEN.ANCHOR_DIRECTORY — the canonical lookup
#     keyed on internal_id; one row per anchor (last-write-wins).
#   PRJ.SUP.002.BEN.ANCHOR_HISTORY   — the audit trail of every
#     transition (one row per RVT received); does NOT carry PII
#     fields, so it survives PSEUDONYMISE intact and serves the
#     audit + GDPR-compliance use cases.
#
# The model exposes no secondary lookup query — internal_id is the
# sole resolution key (per ADR-BCM-FUNC-0016). See Open Question #2
# in aggregates.yaml for the downstream-consumer migration note.
# ──────────────────────────────────────────────────────────────

read_models:

  - id: PRJ.SUP.002.BEN.ANCHOR_DIRECTORY
    name: Canonical anchor directory
    backs_resource: BNK.RLVR.RES.SUP.002.BENEFICIARY_IDENTITY
    fed_by:
      - BNK.RLVR.RVT.SUP.002.BENEFICIARY_ANCHOR_UPDATED
    update_strategy: >-
      Last-write-wins on (internal_id, revision). Drops events whose
      revision is ≤ the locally-observed revision (out-of-order delivery
      protection). For PSEUDONYMISED events, overwrites the four PII
      columns with NULL — the projection should not retain pre-pseudonymisation
      PII.
    fields:
      - { name: internal_id,       kind: identity,  description: "UUIDv7, primary key" }
      - { name: last_name,         kind: snapshot,  nullable: true, description: "NULL when anchor is PSEUDONYMISED" }
      - { name: first_name,        kind: snapshot,  nullable: true }
      - { name: date_of_birth,     kind: snapshot,  nullable: true }
      - { name: contact_details,   kind: snapshot,  nullable: true }
      - { name: anchor_status,     kind: snapshot,  description: "ACTIVE | ARCHIVED | PSEUDONYMISED" }
      - { name: creation_date,     kind: snapshot }
      - { name: pseudonymized_at,  kind: snapshot,  nullable: true }
      - { name: revision,          kind: snapshot,  description: "Last applied revision; used for out-of-order detection" }
      - { name: updated_at,        kind: snapshot,  description: "Wall-clock timestamp of the last applied event" }
    consistency: eventual
    retention: indefinite

  - id: PRJ.SUP.002.BEN.ANCHOR_HISTORY
    name: Anchor transition history (audit trail)
    fed_by:
      - rvt: BNK.RLVR.RVT.SUP.002.BENEFICIARY_ANCHOR_UPDATED
        # Explicit per-field sourcing — every projection column resolves to
        # a wire-format field on the RVT (payload OR envelope). This is the
        # contract the projection consumer implements; if the RVT schema
        # ever drops one of these fields the projection is no longer
        # populable and /process must be re-run.
        sources:
          internal_id:       payload.internal_id
          revision:          payload.revision
          transition_kind:   payload.transition_kind
          command_id:        payload.command_id          # may be null only for system-emitted events
          right_exercise_id: payload.right_exercise_id   # set only for PSEUDONYMISED
          actor:             envelope.actor              # object {kind, subject, on_behalf_of?} — see RVT envelope schema
          occurred_at:       payload.occurred_at
    update_strategy: >-
      Append-only — one row per received RVT, keyed by (internal_id,
      revision). Does NOT carry PII payload fields (only the
      transition_kind, the command_id, the actor object, and the
      wall-clock timestamp), so the audit trail survives a PSEUDONYMISE
      transition without re-creating an Article-17 violation. Note: the
      actor object IS audit-grade personal data when actor.kind == "human"
      (actor.subject is the user's UUIDv7) — the projection inherits the
      7-year retention floor of any identified-user audit log, but does NOT
      inherit the data-subject PSEUDONYMISE obligation
      (right-to-be-forgotten on the beneficiary does not erase the audit
      lineage of the operators / DPO who handled the request).
    fields:
      - { name: internal_id,       kind: identity }
      - { name: revision,          kind: snapshot,  description: "Composite primary key with internal_id" }
      - { name: transition_kind,   kind: snapshot,  description: "MINTED | UPDATED | ARCHIVED | RESTORED | PSEUDONYMISED" }
      - { name: command_id,        kind: snapshot,  nullable: true, description: "Caller-supplied command_id; null only for system-emitted events. Sourced from RVT payload." }
      - { name: right_exercise_id, kind: snapshot,  nullable: true, description: "Set only for PSEUDONYMISED transitions. Sourced from RVT payload." }
      - { name: actor,             kind: snapshot,  description: "Object {kind, subject, on_behalf_of?} — principal that issued the command. Sourced from envelope.actor (per ADR-TECH-STRAT-003). Implementation may store as JSONB or as three decomposed columns — the model is neutral on that choice." }
      - { name: occurred_at,       kind: snapshot,  description: "Wall-clock timestamp of the transition at the aggregate. Sourced from RVT payload." }
    consistency: eventual
    retention: 7y
    retention_rationale: >-
      Aligns with the GDPR + AML retention floor for audit trails of
      personal-data operations. The projection is PII-free by construction
      (it carries the internal_id but no name / dob / contact), so it does
      NOT need to be wiped on PSEUDONYMISATION.

# ──────────────────────────────────────────────────────────────
# Queries — the synchronous (QRY) access path of
# ADR-TECH-STRAT-004's dual-referential-access rule. Each QRY
# is served by exactly one PRJ.
# ──────────────────────────────────────────────────────────────

queries:

  - id: QRY.SUP.002.BEN.GET_ANCHOR
    name: Get an anchor by internal_id
    served_by: PRJ.SUP.002.BEN.ANCHOR_DIRECTORY
    request:
      path_params:
        - { name: internal_id, type: string, format: uuidv7, required: true }
    response:
      shape: BeneficiaryAnchor
      fields_from_projection: ["internal_id", "last_name", "first_name", "date_of_birth", "contact_details", "anchor_status", "creation_date", "pseudonymized_at", "revision"]
      pseudonymised_behaviour: >-
        When anchor_status is PSEUDONYMISED, the four PII fields are returned
        as null. The internal_id is still resolvable so historical references
        do not break.
    consumers:
      - BNK.RLVR.CAP.BSP.001.SCO    # behavioural scoring — needs canonical identity
      - BNK.RLVR.CAP.BSP.002.ENR    # enrolment — opens cases keyed on internal_id
      - BNK.RLVR.CAP.BSP.004.ENV    # budget envelopes — anchors identity
      - BNK.RLVR.CAP.CHN.001.DSH    # beneficiary dashboard — renders identity
      - BNK.RLVR.CAP.CHN.002.VIE    # prescriber view — names of supervised beneficiaries
      - BNK.RLVR.CAP.B2B.001.FLW    # card funding — KYC handover
      - BNK.RLVR.CAP.SUP.001.AUD    # audit — name resolution at audit-render time
      - BNK.RLVR.CAP.SUP.001.RET    # rights — links a right to a known anchor
    api_binding: { method: GET, path: /anchors/{internal_id} }
    cache:
      etag: true
      max_age_seconds: 60
      rationale: >-
        Anchors mutate infrequently (a few transitions per year per
        beneficiary). A 60s freshness window plus ETag/304 keeps consumer
        load low without lying about pseudonymisation — a PSEUDONYMISE
        flips the ETag immediately.

  - id: QRY.SUP.002.BEN.GET_ANCHOR_HISTORY
    name: Get the transition history of an anchor
    served_by: PRJ.SUP.002.BEN.ANCHOR_HISTORY
    request:
      path_params:
        - { name: internal_id, type: string, format: uuidv7, required: true }
      query_params:
        - { name: since_revision, type: integer, required: false, description: "Filter to transitions with revision > since_revision" }
    response:
      shape: AnchorHistory
      fields_from_projection: ["internal_id", "revision", "transition_kind", "command_id", "right_exercise_id", "actor", "occurred_at"]
      pseudonymised_behaviour: >-
        History rows are PII-free by construction. The transition_kind alone
        signals that a PSEUDONYMISED event occurred — useful for compliance
        reporting.
    consumers:
      - BNK.RLVR.CAP.SUP.001.AUD    # audit — primary consumer
      - BNK.RLVR.CAP.SUP.001.RET    # rights — proof that a right was honoured
    api_binding: { method: GET, path: /anchors/{internal_id}/history }
    cache:
      etag: true
      max_age_seconds: 0
      rationale: >-
        Audit consumers need read-after-write semantics; ETag is provided
        for bandwidth, max_age=0 means re-validation on every request.
