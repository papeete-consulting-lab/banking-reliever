meta:
  capability: BNK.RLVR.CAP.SUP.002.BEN
  layer: process-modelling
  version: 0.1.0
  governing_adrs:
    - ADR-BCM-FUNC-0016   # L2 Beneficiary Identity Anchor (supersedes ADR-BCM-FUNC-0013)
    - ADR-BCM-URBA-0009   # event meta-model
    - ADR-BCM-URBA-0010   # L2 as urbanization pivot
    - ADR-BCM-URBA-0012   # canonical business concept (CPT.BCM.000.BENEFICIARY)
    - ADR-TECH-STRAT-001  # operational rail (RabbitMQ) — Rule 3 (outbox / at-least-once)
    - ADR-TECH-STRAT-004  # data and referential layer — PII governance, dual referential access
    - ADR-TECH-STRAT-007  # identifier strategy — UUIDv7, immutable anchors, no-recycle-forever
    - ADR-TECH-STRAT-008  # information publication model — capability as multi-faceted producer
    - ADR-TECH-TACT-002   # tactical stack — Python / FastAPI / PostgreSQL / pgcrypto / Vault transit / crypto-shredding

# ──────────────────────────────────────────────────────────────
# Aggregates — the consistency boundaries of this capability.
# Each AGG owns a piece of state, accepts commands, enforces
# invariants atomically, and emits domain events on transition.
# Identifier: AGG.<ZONE>.<L1>.<L2>.<NAME>
#
# Granularity: one aggregate per beneficiary, keyed by the
# server-minted UUIDv7 anchor identifier (per ADR-TECH-STRAT-007).
# Identity is owned by this capability alone (golden-record rule,
# ADR-BCM-FUNC-0016): the aggregate accepts no caller-supplied
# identifier on MINT and exposes no upstream-key-rooted idempotency
# anchor. Idempotency is anchored on a caller-supplied UUIDv7
# client_request_id for MINT and on command_id for the lifecycle
# verbs (UPDATE / ARCHIVE / RESTORE / PSEUDONYMISE).
#
# The capability's BCM corpus declares ZERO consumed events
# today (consumed_business_events / consumed_resource_events
# slices both empty). ADR-BCM-FUNC-0016 documents the intent
# to subscribe to RightExercised.Processed from BNK.RLVR.CAP.SUP.001.RET
# to drive PSEUDONYMISATION reactively — see Open Question #1.
# Until that subscription exists upstream, PSEUDONYMISE is
# HTTP-driven (issued by an admin tool or by BNK.RLVR.CAP.SUP.001.RET
# directly via REST).
# ──────────────────────────────────────────────────────────────

aggregates:

  - id: AGG.SUP.002.BEN.IDENTITY_ANCHOR
    name: Canonical beneficiary identity anchor
    business_object: BNK.RLVR.OBJ.SUP.002.BENEFICIARY_RECORD
    aggregate_id_field: internal_id
    cardinality: one-per-beneficiary
    description: >-
      The canonical anchor record for one beneficiary's identity in the
      Reliever IS. Sole source of truth for every other capability that needs
      to resolve a beneficiary by internal_id (per ADR-TECH-STRAT-004's
      dual-referential-access rule). Holds personally identifiable information
      (PII) under joint custody of IT Security / Identity & DPO. Operates the
      GDPR Art. 17 pseudonymisation-at-anchor mechanics — the destruction of
      PII happens HERE, with downstream caches reconciling via the bus.

    state:
      - field: internal_id
        kind: identity
        description: >-
          Server-minted UUIDv7 (RFC 9562 §5.7). Wall-clock-prefixed so the
          identifier is k-sortable for projection indexing. Immutable and
          never recycled (per ADR-TECH-STRAT-007 Rules 7.a / 7.b).
      - field: last_name
        kind: snapshot
        description: PII — wipeable under GDPR Art. 17 (pseudonymisation).
      - field: first_name
        kind: snapshot
        description: PII — wipeable under GDPR Art. 17.
      - field: date_of_birth
        kind: snapshot
        description: PII — wipeable under GDPR Art. 17.
      - field: contact_details
        kind: snapshot
        description: >-
          PII — postal address + contact channels. Object — see the schemas
          for the exact shape. Wipeable under GDPR Art. 17.
      - field: anchor_status
        kind: snapshot
        description: >-
          ACTIVE | ARCHIVED | PSEUDONYMISED. Replaces the prior
          referential_status enum; PSEUDONYMISED is a new terminal state that
          encodes the GDPR Art. 17 outcome.
      - field: creation_date
        kind: snapshot
        description: Date the anchor was minted.
      - field: pseudonymized_at
        kind: snapshot
        description: >-
          Timestamp set when PSEUDONYMISE_ANCHOR is accepted; null while the
          anchor is ACTIVE or ARCHIVED.
      - field: last_processed_command_id
        kind: idempotency
        description: >-
          Idempotency anchor for UPDATE / ARCHIVE / RESTORE / PSEUDONYMISE —
          caller-supplied command_id, deduplicated over a 30-day window.
      - field: last_processed_client_request_id
        kind: idempotency
        description: >-
          Idempotency anchor for MINT — caller-supplied UUIDv7 client_request_id,
          deduplicated over a 30-day window. The MINT verb exposes no other
          idempotency surface (see Open Question #2).
      - field: revision
        kind: snapshot
        description: >-
          Monotonic counter incremented on every state transition. Carried in
          the emitted RVT so consumers can detect out-of-order delivery and
          reconcile their local cache (per ADR-TECH-STRAT-004).

    accepted_commands:
      - CMD.SUP.002.BEN.MINT_ANCHOR
      - CMD.SUP.002.BEN.UPDATE_ANCHOR
      - CMD.SUP.002.BEN.ARCHIVE_ANCHOR
      - CMD.SUP.002.BEN.RESTORE_ANCHOR
      - CMD.SUP.002.BEN.PSEUDONYMISE_ANCHOR

    emitted_resource_events:
      - BNK.RLVR.RVT.SUP.002.BENEFICIARY_ANCHOR_UPDATED  # canonical change event — emitted on every state transition

    invariants:

      - id: INV.BEN.001
        rule: >-
          Exactly one anchor per internal_id. internal_id is a UUIDv7 minted
          by the aggregate at MINT time; it is the only legitimate identifier
          and is server-generated — the aggregate REJECTS any caller-supplied
          internal_id.
        rationale: >-
          ADR-TECH-STRAT-007 Rule 1 (federated UUID minting) and Rule 7.b
          (no-recycle-forever). The natural-key collision (same name + dob)
          is NOT enforced here; homonyms are legitimate. Disambiguation is the
          upstream candidacy capability's concern.

      - id: INV.BEN.002
        rule: >-
          internal_id is immutable for the lifetime of the anchor. UPDATE /
          ARCHIVE / RESTORE / PSEUDONYMISE NEVER change it. Even after
          pseudonymisation the internal_id is preserved — only PII is wiped.
        rationale: >-
          Every other capability keys its local cache on internal_id. Mutating
          it would invalidate every cache and break audit lineage
          (ADR-TECH-STRAT-007 Rule 7.a — immutable anchor).

      - id: INV.BEN.003
        rule: >-
          UPDATE_ANCHOR accepts partial payloads — only fields explicitly
          present in the command are modified. Absent fields are left
          unchanged (sticky-PII rule). To clear a contact channel, the caller
          must explicitly pass the channel with an empty value via a dedicated
          nullability marker; otherwise PII fields are sticky.
        rationale: >-
          Defends against accidental PII erasure under partial integrations.
          PII destruction must go through PSEUDONYMISE_ANCHOR (auditable
          GDPR path), never through silent UPDATE.

      - id: INV.BEN.004
        rule: >-
          ARCHIVE_ANCHOR flips anchor_status from ACTIVE to ARCHIVED. Rejected
          if status is already ARCHIVED or PSEUDONYMISED. Archived anchors
          remain queryable (referential reads still resolve them) but no
          further UPDATE is accepted until RESTORE is issued.
        rationale: >-
          ADR-BCM-FUNC-0016 — programme exit may archive a beneficiary while
          consumers still need to resolve historical references.

      - id: INV.BEN.005
        rule: >-
          RESTORE_ANCHOR flips anchor_status from ARCHIVED back to ACTIVE.
          Rejected if status is ACTIVE or PSEUDONYMISED. Restoration must be
          a rare, audited operation (typically: archival in error).
        rationale: Operational safety — undo path for ARCHIVE only.

      - id: INV.BEN.006
        rule: >-
          PSEUDONYMISE_ANCHOR is the GDPR Art. 17 mechanism. Accepted from
          ACTIVE or ARCHIVED. Rejected if anchor_status is already
          PSEUDONYMISED (operation is not idempotent on outcome but is
          idempotent on command_id — duplicate command_id returns the prior
          result). Wipes the four PII fields (last_name, first_name,
          date_of_birth, contact_details) by overwriting them with deterministic
          crypto-shredded null markers (the implementation uses pgcrypto +
          Vault transit per ADR-TECH-TACT-002 — the model only constrains the
          observable post-condition: PII fields are NOT recoverable). Sets
          anchor_status = PSEUDONYMISED, pseudonymized_at = NOW(). Irreversible
          — there is NO un-pseudonymise command.
        rationale: >-
          ADR-TECH-STRAT-007 Rule 7.c (privacy-by-design erasure) and the
          GDPR Art. 17 obligation lifted in ADR-BCM-FUNC-0016. Crypto-shredding
          gives provable destruction without breaking foreign-key integrity at
          downstream consumers — the internal_id survives, only the PII does
          not.

      - id: INV.BEN.007
        rule: >-
          Every accepted state transition emits exactly one
          BNK.RLVR.RVT.SUP.002.BENEFICIARY_ANCHOR_UPDATED carrying the FULL post-
          transition state of the anchor (snapshot semantics) plus the
          monotonically-incremented `revision` and a `transition_kind`
          discriminator (MINTED | UPDATED | ARCHIVED | RESTORED |
          PSEUDONYMISED). For PSEUDONYMISED transitions, the four PII fields
          in the payload are crypto-shredded null markers — consumers MUST
          treat the receipt of a PSEUDONYMISED event as the trigger to wipe
          their local cached PII for that internal_id while preserving the
          internal_id reference itself for historical event linkage.
        rationale: >-
          ADR-TECH-STRAT-004 — consumers maintain local caches; full-state
          snapshot semantics make their reconciliation a simple last-write-
          wins merge keyed on (internal_id, revision). The PSEUDONYMISED
          discriminator is what propagates the GDPR erasure obligation across
          the IS via the bus.

      - id: INV.BEN.008
        rule: >-
          Idempotency keys are aggregate-scoped and command-kind-scoped.
          MINT_ANCHOR deduplicates on client_request_id (UUIDv7, 30-day
          window). UPDATE / ARCHIVE / RESTORE / PSEUDONYMISE deduplicate on
          command_id (caller-supplied UUIDv7, 30-day window). Duplicates are
          silently dropped (idempotent no-op) and return the previously
          emitted result.
        rationale: >-
          ADR-TECH-STRAT-001 Rule 3 (at-least-once delivery via outbox) and
          ADR-TECH-STRAT-007 Rule 4 (UUIDv7 as idempotency anchor across the
          IS). Clients must tolerate retry on every API path.

    consistency_boundary: per-aggregate-instance
    transactional_outbox: required
    snapshotting:
      strategy: every-N-events
      n: 50
      rationale: >-
        A beneficiary's anchor changes infrequently (a few transitions per
        year). Snapshot frequency is deliberately low. PSEUDONYMISE produces
        a transition like any other — the outbox emits the wipe event with
        the same outbox guarantees as a normal UPDATE.

    open_questions:
      - id: OQ.BEN.001
        rule: >-
          ADR-BCM-FUNC-0016 declares the intent to consume
          RightExercised.Processed from BNK.RLVR.CAP.SUP.001.RET to drive
          PSEUDONYMISE_ANCHOR reactively. The BCM corpus does not yet
          declare the consumed business / resource event chain. Until that
          chain exists upstream, PSEUDONYMISE is HTTP-only (issued by an
          admin tool, or by BNK.RLVR.CAP.SUP.001.RET via REST).
        remediation: >-
          When banking-knowledge declares the consumed event family for
          BNK.RLVR.CAP.SUP.001.RET / RightExercised.Processed, re-run /process
          BNK.RLVR.CAP.SUP.002.BEN to add POL.SUP.002.BEN.ON_RIGHT_EXERCISED listening
          on that subscription and issuing PSEUDONYMISE_ANCHOR.

      - id: OQ.BEN.002
        rule: >-
          The model exposes no secondary lookup path keyed on any caller-
          supplied identifier — internal_id is the sole resolution key.
          Downstream consumers must observe the MINTED RVT, key their local
          cache by internal_id from then on, and use their own correlation
          field on the way in.
        remediation: >-
          Confirm with each consumer (BNK.RLVR.CAP.BSP.001.SCO, BNK.RLVR.CAP.BSP.002.ENR,
          BNK.RLVR.CAP.BSP.004.ENV) that the internal_id-only resolution rule does not
          break a necessary lookup path; if any consumer needs an alternate
          lookup key, surface it as a new BCM business-event before
          re-modelling.
