meta:
  capability: BNK.RLVR.CAP.BSP.001.SCO
  layer: process-modelling
  version: 0.2.0
  governing_adrs:
    - ADR-BCM-FUNC-0005
    - ADR-BCM-URBA-0009
    - ADR-TECH-STRAT-007  # identifier strategy — UUIDv7 idempotency anchors
    - ADR-TECH-TACT-003   # tactical stack — Python / FastAPI; api_binding feeds FastAPI routes

# ──────────────────────────────────────────────────────────────
# Commands — verbs this capability accepts. Each CMD is the
# unit a client (HTTP API, in-process policy, saga) issues to
# request a state transition. A CMD is always handled by exactly
# one aggregate, and emits zero or more domain events.
# Identifier: CMD.<ZONE>.<L1>.<L2>.<VERB>
# ──────────────────────────────────────────────────────────────

commands:

  - id: CMD.BSP.001.SCO.COMPUTE_ENTRY_SCORE
    name: Compute entry score
    intent: >-
      At enrolment time, compute the baseline behavioural score from a snapshot
      of declarative signals. Establishes the reference point against which all
      subsequent recomputations measure progression.
    accepted_by: AGG.BSP.001.SCO.SCORE_OF_BENEFICIARY
    issued_by:
      - POL.BSP.001.SCO.ON_ENROLMENT_COMPLETED
    payload_schema: schemas/CMD.BSP.001.SCO.COMPUTE_ENTRY_SCORE.schema.json
    preconditions:
      - id: PRE.001
        rule: No prior evaluation exists for this case_id (entry score is a one-shot).
      - id: PRE.002
        rule: >-
          case_id resolves to an active beneficiary anchor in BNK.RLVR.CAP.SUP.002.BEN
          (formerly BNK.RLVR.CAP.REF.001.BEN — relocated 2026-05-15 per ADR-BCM-FUNC-0016).
          The lookup is delegated; this capability does not embed beneficiary
          PII.
    invariants_enforced:
      - INV.SCO.001  # see aggregates.yaml
    emits:
      - BNK.RLVR.RVT.BSP.001.ENTRY_SCORE_COMPUTED
      # business-event family pivot (no autonomous bus message — Rule 2 of ADR-TECH-STRAT-001):
      # BNK.RLVR.EVT.BSP.001.SCORE_RECOMPUTED
    errors:
      - code: ENTRY_SCORE_ALREADY_EXISTS
        when: An evaluation already exists for case_id.
      - code: BENEFICIARY_UNKNOWN
        when: case_id does not resolve to an active anchor in BNK.RLVR.CAP.SUP.002.BEN.
    idempotency:
      key: case_id
      window: lifetime
    api_binding: { method: POST, path: /cases/{case_id}/entry-score }

  - id: CMD.BSP.001.SCO.RECOMPUTE_SCORE
    name: Recompute current score from a behavioural trigger
    intent: >-
      Recompute the current behavioural score after a transaction or a qualified
      behavioural signal. Captures the magnitude (delta) and emits a threshold
      event when the new value crosses a tier boundary.
    accepted_by: AGG.BSP.001.SCO.SCORE_OF_BENEFICIARY
    issued_by:
      - POL.BSP.001.SCO.ON_BEHAVIOURAL_TRIGGER
    payload_schema: schemas/CMD.BSP.001.SCO.RECOMPUTE_SCORE.schema.json
    preconditions:
      - id: PRE.001
        rule: An entry score exists for this case_id (the aggregate has been initialised).
      - id: PRE.002
        rule: trigger.event_id has not already been processed (idempotency by causation).
    invariants_enforced:
      - INV.SCO.001
      - INV.SCO.002
      - INV.SCO.003
    emits:
      - BNK.RLVR.RVT.BSP.001.CURRENT_SCORE_RECOMPUTED          # always
      - BNK.RLVR.RVT.BSP.001.SCORE_THRESHOLD_REACHED           # conditional — only when threshold crossed
    errors:
      - code: AGGREGATE_NOT_INITIALISED
        when: No entry score exists for case_id.
      - code: TRIGGER_ALREADY_PROCESSED
        when: trigger.event_id has previously been applied.
      - code: MODEL_VERSION_MISMATCH
        when: The active scoring model version is incompatible with the persisted state.
    idempotency:
      key: trigger.event_id
      window: 30d
    api_binding: { method: POST, path: /cases/{case_id}/score-recomputations }

# ──────────────────────────────────────────────────────────────
# Trigger discriminator — kept here (not in a separate file) so
# that handlers and policies can be type-checked against the
# same enum as the command schema.
# ──────────────────────────────────────────────────────────────

trigger_kinds:
  - id: TRANSACTION_AUTHORIZED
    upstream_event: BNK.RLVR.EVT.BSP.004.TRANSACTION_AUTHORIZED
    upstream_resource_event: BNK.RLVR.RVT.BSP.004.PAYMENT_GRANTED
    polarity: positive
  - id: TRANSACTION_REFUSED
    upstream_event: BNK.RLVR.EVT.BSP.004.TRANSACTION_REFUSED
    upstream_resource_event: BNK.RLVR.RVT.BSP.004.PAYMENT_BLOCKED
    polarity: negative
  - id: RELAPSE_SIGNAL
    upstream_event: BNK.RLVR.EVT.BSP.001.RELAPSE_SIGNAL_DETECTED
    upstream_resource_event: BNK.RLVR.RVT.BSP.001.RELAPSE_SIGNAL_QUALIFIED
    polarity: negative
  - id: PROGRESSION_SIGNAL
    upstream_event: BNK.RLVR.EVT.BSP.001.PROGRESSION_SIGNAL_DETECTED
    upstream_resource_event: BNK.RLVR.RVT.BSP.001.PROGRESSION_SIGNAL_QUALIFIED
    polarity: positive
