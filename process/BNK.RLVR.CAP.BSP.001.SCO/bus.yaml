meta:
  capability: BNK.RLVR.CAP.BSP.001.SCO
  layer: process-modelling
  version: 0.2.0
  governing_adrs:
    - ADR-TECH-STRAT-001  # Dual-rail event infrastructure — NORMATIVE for the operational rail
    - ADR-TECH-STRAT-004  # data-and-referential layer — identity_resolution rule
    - ADR-TECH-STRAT-007  # identifier strategy — UUIDv7 envelope (message_id / correlation_id / causation_id)
    - ADR-TECH-STRAT-008  # publication model — capability as multi-faceted producer (operational + analytical + REST)
    - ADR-TECH-TACT-003   # tactical stack — Python publisher with PostgreSQL transactional outbox

# ──────────────────────────────────────────────────────────────
# Bus topology — the OPERATIONAL rail (RabbitMQ topic exchange)
# owned by this capability. The ANALYTICAL rail (Kafka data
# product) is fed downstream of the same PostgreSQL transactional
# outbox via CDC (per ADR-TECH-STRAT-001 dual-rail and
# ADR-TECH-STRAT-008 multi-faceted-producer). The CDC topology
# is not modelled here — only the operational facet that this
# capability publishes itself.
# ──────────────────────────────────────────────────────────────

publication:
  broker: rabbitmq
  exchange:
    name: bsp.001.sco-events
    type: topic
    durable: true
    owned_by: BNK.RLVR.CAP.BSP.001.SCO
    rule_reference: ADR-TECH-STRAT-001 Rules 1, 5

  # Per ADR-TECH-STRAT-001 Rule 2, only resource events generate autonomous
  # bus messages. Business events appear ONLY as the prefix of the routing key
  # (Rule 4) — never as standalone messages.

  routing_keys:
    - resource_event: BNK.RLVR.RVT.BSP.001.ENTRY_SCORE_COMPUTED
      paired_business_event: BNK.RLVR.EVT.BSP.001.SCORE_RECOMPUTED
      routing_key: BNK.RLVR.EVT.BSP.001.SCORE_RECOMPUTED.BNK.RLVR.RVT.BSP.001.ENTRY_SCORE_COMPUTED
      schema: schemas/BNK.RLVR.RVT.BSP.001.ENTRY_SCORE_COMPUTED.schema.json
      payload_form: domain-event-ddd

    - resource_event: BNK.RLVR.RVT.BSP.001.CURRENT_SCORE_RECOMPUTED
      paired_business_event: BNK.RLVR.EVT.BSP.001.SCORE_RECOMPUTED
      routing_key: BNK.RLVR.EVT.BSP.001.SCORE_RECOMPUTED.BNK.RLVR.RVT.BSP.001.CURRENT_SCORE_RECOMPUTED
      schema: schemas/BNK.RLVR.RVT.BSP.001.CURRENT_SCORE_RECOMPUTED.schema.json
      payload_form: domain-event-ddd

    - resource_event: BNK.RLVR.RVT.BSP.001.SCORE_THRESHOLD_REACHED
      paired_business_event: BNK.RLVR.EVT.BSP.001.SCORE_THRESHOLD_REACHED
      routing_key: BNK.RLVR.EVT.BSP.001.SCORE_THRESHOLD_REACHED.BNK.RLVR.RVT.BSP.001.SCORE_THRESHOLD_REACHED
      schema: schemas/BNK.RLVR.RVT.BSP.001.SCORE_THRESHOLD_REACHED.schema.json
      payload_form: domain-event-ddd

  envelope:
    message_id_kind: uuidv7        # ADR-TECH-STRAT-007 Rule 4 — every bus message carries a fresh UUIDv7
    correlation_id_kind: uuidv7    # set to case_id (the aggregate identity) for score-flow events
    causation_id_kind: uuidv7      # the trigger.event_id of the upstream RVT, or the request_id of an HTTP-back-channel call
    schema_version_kind: semver

  correlation_key: case_id
  identity_resolution: >-
    Consumers that need the canonical beneficiary identity resolve case_id →
    BNK.RLVR.OBJ.SUP.002.BENEFICIARY_RECORD.internal_id via a BNK.RLVR.CAP.SUP.002.BEN lookup
    (formerly BNK.RLVR.CAP.REF.001.BEN — relocated 2026-05-15 per ADR-BCM-FUNC-0016 from
    REFERENTIAL to SUPPORT). The producer NEVER carries the canonical
    internal_id; that contract is preserved across the move because the
    score-flow does not need to embed PII (per ADR-TECH-STRAT-004 PII
    governance).

# ──────────────────────────────────────────────────────────────
# Subscription side — events consumed from upstream capabilities.
# The producing exchange is owned by the upstream capability;
# this capability declares queues bound to it.
# ──────────────────────────────────────────────────────────────

subscriptions:
  - source_capability: BNK.RLVR.CAP.BSP.004.AUT
    source_exchange: bsp.004.aut-events
    binding_pattern: BNK.RLVR.EVT.BSP.004.TRANSACTION_AUTHORIZED.BNK.RLVR.RVT.BSP.004.PAYMENT_GRANTED
    queue: bsp.001.sco.q.transaction-authorized
    business_subscription: BNK.RLVR.SUB.BUSINESS.BSP.001.001
    resource_subscription: BNK.RLVR.SUB.RESOURCE.BSP.001.001
    consumed_by: POL.BSP.001.SCO.ON_BEHAVIOURAL_TRIGGER

  - source_capability: BNK.RLVR.CAP.BSP.004.AUT
    source_exchange: bsp.004.aut-events
    binding_pattern: BNK.RLVR.EVT.BSP.004.TRANSACTION_REFUSED.BNK.RLVR.RVT.BSP.004.PAYMENT_BLOCKED
    queue: bsp.001.sco.q.transaction-refused
    business_subscription: BNK.RLVR.SUB.BUSINESS.BSP.001.002
    resource_subscription: BNK.RLVR.SUB.RESOURCE.BSP.001.002
    consumed_by: POL.BSP.001.SCO.ON_BEHAVIOURAL_TRIGGER

  - source_capability: BNK.RLVR.CAP.BSP.001.SIG
    source_exchange: bsp.001.sig-events
    binding_pattern: BNK.RLVR.EVT.BSP.001.RELAPSE_SIGNAL_DETECTED.BNK.RLVR.RVT.BSP.001.RELAPSE_SIGNAL_QUALIFIED
    queue: bsp.001.sco.q.relapse-signal
    business_subscription: BNK.RLVR.SUB.BUSINESS.BSP.001.003
    resource_subscription: BNK.RLVR.SUB.RESOURCE.BSP.001.003
    consumed_by: POL.BSP.001.SCO.ON_BEHAVIOURAL_TRIGGER

  - source_capability: BNK.RLVR.CAP.BSP.001.SIG
    source_exchange: bsp.001.sig-events
    binding_pattern: BNK.RLVR.EVT.BSP.001.PROGRESSION_SIGNAL_DETECTED.BNK.RLVR.RVT.BSP.001.PROGRESSION_SIGNAL_QUALIFIED
    queue: bsp.001.sco.q.progression-signal
    business_subscription: BNK.RLVR.SUB.BUSINESS.BSP.001.004
    resource_subscription: BNK.RLVR.SUB.RESOURCE.BSP.001.004
    consumed_by: POL.BSP.001.SCO.ON_BEHAVIOURAL_TRIGGER

# ──────────────────────────────────────────────────────────────
# Known consumers of THIS capability's events. Sourced from
# bcm/business-subscription-reliever.yaml + resource-subscription-reliever.yaml.
# ──────────────────────────────────────────────────────────────

consumers:
  - capability: BNK.RLVR.CAP.BSP.001.ARB
    binds_to:
      - BNK.RLVR.EVT.BSP.001.SCORE_RECOMPUTED.BNK.RLVR.RVT.BSP.001.CURRENT_SCORE_RECOMPUTED
    rationale: Algorithmic vs prescriber-override arbitration on each recomputation.

  - capability: BNK.RLVR.CAP.BSP.001.TIE
    binds_to:
      - BNK.RLVR.EVT.BSP.001.SCORE_THRESHOLD_REACHED.#
    rationale: Tier transition is triggered by threshold crossing.

  - capability: BNK.RLVR.CAP.CHN.001.DSH
    binds_to:
      - BNK.RLVR.EVT.BSP.001.SCORE_RECOMPUTED.#
    rationale: Beneficiary dashboard progression bar.

  - capability: BNK.RLVR.CAP.CHN.002.VUE
    binds_to:
      - BNK.RLVR.EVT.BSP.001.SCORE_RECOMPUTED.BNK.RLVR.RVT.BSP.001.CURRENT_SCORE_RECOMPUTED
    rationale: Prescriber view — current score and history.
