meta:
  capability: BNK.RLVR.CAP.BSP.001.SCO
  layer: process-modelling
  version: 0.2.0
  derivation: >-
    This file is the synthesised HTTP/RPC surface of BNK.RLVR.CAP.BSP.001.SCO. It is
    DERIVED from commands.yaml + read-models.yaml — the api_binding fields
    declared there. Keep in sync; the BFF/microservice scaffolding agents
    consume this view, not the raw command/query files.
  governing_adrs:
    - ADR-TECH-STRAT-003  # API contract strategy — REST/HTTP, JWT-borne actor
    - ADR-TECH-STRAT-008  # publication model — REST is one of the two access paths
    - ADR-TECH-TACT-003   # tactical stack — Python / FastAPI; operations map to FastAPI routes

api:
  base_path: /capabilities/bsp/001/sco
  authentication: bearer-token (sourced from BNK.RLVR.CAP.SUP.001 — out of scope here)

  # ── Command endpoints (state-mutating) ──
  commands:
    - operation_id: computeEntryScore
      method: POST
      path: /cases/{case_id}/entry-score
      issues: CMD.BSP.001.SCO.COMPUTE_ENTRY_SCORE
      request_schema: schemas/CMD.BSP.001.SCO.COMPUTE_ENTRY_SCORE.schema.json
      responses:
        201: { description: Entry score computed; body mirrors BNK.RLVR.RVT.ENTRY_SCORE_COMPUTED }
        409: { description: ENTRY_SCORE_ALREADY_EXISTS }
        404: { description: BENEFICIARY_UNKNOWN }

    - operation_id: recomputeScore
      method: POST
      path: /cases/{case_id}/score-recomputations
      issues: CMD.BSP.001.SCO.RECOMPUTE_SCORE
      request_schema: schemas/CMD.BSP.001.SCO.RECOMPUTE_SCORE.schema.json
      responses:
        202: { description: Recomputation accepted (async; bus carries the outcome) }
        409: { description: AGGREGATE_NOT_INITIALISED }
        200: { description: TRIGGER_ALREADY_PROCESSED — idempotent no-op }
      note: >-
        This endpoint exists primarily for back-channel triggers and tests.
        The canonical flow is event-driven via POL.ON_BEHAVIOURAL_TRIGGER.

  # ── Query endpoints (read-only) ──
  queries:
    - operation_id: getCurrentScore
      method: GET
      path: /cases/{case_id}/score
      serves: QRY.BSP.001.SCO.GET_CURRENT_SCORE
      cache: { etag: true, max_age: PT5S }
      responses:
        200: { description: Current score view }
        404: { description: No evaluation for case_id }

    - operation_id: listScoreHistory
      method: GET
      path: /cases/{case_id}/score-history
      serves: QRY.BSP.001.SCO.LIST_SCORE_HISTORY
      query_params:
        - { name: since, in: query, type: date }
        - { name: limit, in: query, type: integer, default: 50 }
      responses:
        200: { description: Score history (chronological) }
        404: { description: No evaluation for case_id }
