meta:
  capability: BNK.RLVR.CAP.CHN.001.DSH
  layer: process-modelling
  version: 0.2.0
  governing_adrs:
    - ADR-BCM-FUNC-0009
    - ADR-TECH-STRAT-003   # ETag, BFF per channel
    - ADR-TECH-STRAT-008   # Capability as multi-faceted information producer
    - ADR-TECH-TACT-001    # vanilla-js polling, etag, local-storage, pii-exclusion

# ──────────────────────────────────────────────────────────────
# Read models — projections served to the mobile frontend. The
# BFF holds the projection in-memory (it IS the aggregate state);
# no separate read store is materialised. ETag and short max_age
# values are mandated by the tactical stack — the frontend polls
# at a low cadence and the BFF responds 304 most of the time.
# Identifier: PRJ.<ZONE>.<L1>.<L2>.<NAME> / QRY.<ZONE>.<L1>.<L2>.<NAME>
# ──────────────────────────────────────────────────────────────

read_models:

  - id: PRJ.CHN.001.DSH.DASHBOARD_VIEW
    name: Beneficiary dashboard view
    description: >-
      Synthesised, PII-free snapshot of a beneficiary's situation: tier,
      score, open envelopes with available balances. Backed directly by
      AGG.CHN.001.DSH.BENEFICIARY_DASHBOARD's snapshot fields — the BFF
      does not materialise a separate read store. Surfaced by the
      mobile dashboard tab.
    fed_by:
      # Upstream RVTs that, after policy translation, drive the aggregate
      # state. Listed here for lineage (ADR-TECH-STRAT-005 EventCatalog
      # tracing); the projection is updated synchronously inside the
      # aggregate, not by a separate projector.
      - BNK.RLVR.RVT.BSP.001.CURRENT_SCORE_RECOMPUTED
      - BNK.RLVR.RVT.BSP.001.TIER_UPGRADE_RECORDED
      - BNK.RLVR.RVT.BSP.004.CONSUMPTION_RECORDED
    fields:
      - case_id
      - current_tier_code
      - tier_upgraded_at
      - current_score
      - score_recomputed_at
      - open_envelopes        # array of {envelope_id, category, allocated_amount, consumed_amount, available_amount, currency, last_updated_at}
      - last_synced_at        # max(score_recomputed_at, tier_upgraded_at, max(open_envelopes[].last_updated_at))
    consistency: eventual
    pii_classification: none  # ADR-TECH-TACT-001 pii-exclusion enforced by INV.DSH.001

  - id: PRJ.CHN.001.DSH.RECENT_TRANSACTIONS
    name: Recent transactions feed
    description: >-
      Bounded most-recent-first list of envelope consumption entries for a
      beneficiary. Bounded by INV.DSH.005 (max 50 entries, max age 30 days).
      Surfaced as the "recent activity" panel on the mobile dashboard.
    fed_by:
      - BNK.RLVR.RVT.BSP.004.CONSUMPTION_RECORDED
    fields:
      - transaction_id
      - envelope_id
      - category
      - amount
      - currency
      - merchant_label
      - recorded_at
    retention: 30d
    bounded_by: { count: 50, age: 30d }
    consistency: eventual
    pii_classification: low
    pii_note: >-
      merchant_label is a non-PII semantic label (e.g. "GROCERY", "TRANSPORT")
      derived upstream by BNK.RLVR.CAP.BSP.004.ENV; raw merchant names are NEVER
      stored. category is also non-PII.

queries:

  - id: QRY.CHN.001.DSH.GET_DASHBOARD
    served_by: PRJ.CHN.001.DSH.DASHBOARD_VIEW
    request:
      case_id: string
    response:
      shape: object
      fields:
        - case_id
        - current_tier_code
        - tier_upgraded_at
        - current_score
        - score_recomputed_at
        - open_envelopes
        - last_synced_at
    consumers:
      - frontend  # BNK.RLVR.CAP.CHN.001.DSH's own vanilla-JS frontend
    api_binding: { method: GET, path: "/cases/{case_id}/dashboard" }
    cache: { etag: true, max_age: PT5S }
    polling_hint: >-
      Frontend polls at a 5-second cadence (matches max_age). Most polls
      return 304 Not Modified because dashboards are quiet between
      events. ADR-TECH-TACT-001 explicitly opts into polling rather than
      WebSocket / SSE for simplicity.

  - id: QRY.CHN.001.DSH.LIST_RECENT_TRANSACTIONS
    served_by: PRJ.CHN.001.DSH.RECENT_TRANSACTIONS
    request:
      case_id: string
      limit:  { type: integer, default: 20, max: 50 }
    response:
      shape: array
      item_fields:
        - transaction_id
        - envelope_id
        - category
        - amount
        - currency
        - merchant_label
        - recorded_at
    consumers:
      - frontend
    api_binding: { method: GET, path: "/cases/{case_id}/transactions" }
    cache: { etag: true, max_age: PT5S }
