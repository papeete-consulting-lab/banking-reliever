meta:
  capability: BNK.RLVR.CAP.CHN.001.DSH
  layer: process-modelling
  version: 0.2.0
  governing_adrs:
    - ADR-BCM-FUNC-0009
    - ADR-TECH-STRAT-001   # At-least-once delivery; ack/retry/DLQ discipline

# ──────────────────────────────────────────────────────────────
# Policies — reactive rules. A policy listens to one or more
# resource events from upstream capabilities and issues exactly
# one command. The dashboard BFF has three policies — one per
# upstream subscription declared in FUNC-0009. Aggregates never
# subscribe to the bus directly.
# Identifier: POL.<ZONE>.<L1>.<L2>.<NAME>
# ──────────────────────────────────────────────────────────────

policies:

  - id: POL.CHN.001.DSH.ON_SCORE_RECOMPUTED
    name: Synchronise dashboard on every score recomputation
    intent: >-
      Whenever BNK.RLVR.CAP.BSP.001.SCO emits BNK.RLVR.RVT.CURRENT_SCORE_RECOMPUTED for a case,
      the dashboard BFF translates it into a SYNCHRONIZE_SCORE command so
      the gamified progress bar reflects the new value within one polling
      cycle on the mobile frontend.
    listens_to:
      - resource_event: BNK.RLVR.RVT.BSP.001.CURRENT_SCORE_RECOMPUTED
        business_subscription: BNK.RLVR.SUB.BUSINESS.CHN.001.001
        resource_subscription: BNK.RLVR.SUB.RESOURCE.CHN.001.001
        trigger_kind: SCORE_RECOMPUTED
    issues: CMD.CHN.001.DSH.SYNCHRONIZE_SCORE
    mapping_rule: >-
      Build CMD payload from the upstream resource event:
        case_id                    <- upstream.case_id
        trigger.event_id           <- upstream.event_id (idempotency key)
        trigger.score_value        <- upstream.score_value
        trigger.delta_score        <- upstream.delta_score
        trigger.recomputed_at      <- upstream.computation_timestamp (monotonicity check)
        trigger.model_version      <- upstream.model_version (passed through for observability)
    error_handling:
      - on: EVENT_ALREADY_PROCESSED
        action: ack-and-drop
        rationale: Idempotent replay — expected on at-least-once delivery.
      - on: STALE_EVENT
        action: ack-and-drop
        rationale: >-
          Out-of-order resource event — the dashboard already reflects a
          newer score. Dropping silently preserves monotonicity.
    delivery: at-least-once

  - id: POL.CHN.001.DSH.ON_TIER_UPGRADE_RECORDED
    name: Synchronise dashboard on every tier upgrade
    intent: >-
      Whenever BNK.RLVR.CAP.BSP.001.TIE emits BNK.RLVR.RVT.TIER_UPGRADE_RECORDED for a case,
      the BFF translates it into a SYNCHRONIZE_TIER command. The frontend
      detects the change between two consecutive GET /dashboard polls and
      plays the rewarding tier-upgrade animation client-side.
    listens_to:
      - resource_event: BNK.RLVR.RVT.BSP.001.TIER_UPGRADE_RECORDED
        business_subscription: BNK.RLVR.SUB.BUSINESS.CHN.001.002
        resource_subscription: BNK.RLVR.SUB.RESOURCE.CHN.001.002
        trigger_kind: TIER_UPGRADED
    issues: CMD.CHN.001.DSH.SYNCHRONIZE_TIER
    mapping_rule: >-
      Build CMD payload from the upstream resource event:
        case_id                    <- upstream.case_id
        trigger.event_id           <- upstream.event_id (idempotency key)
        trigger.previous_tier_code <- upstream.previous_tier_code
        trigger.current_tier_code  <- upstream.current_tier_code
        trigger.upgraded_at        <- upstream.transitioned_at (monotonicity check)
    error_handling:
      - on: EVENT_ALREADY_PROCESSED
        action: ack-and-drop
        rationale: Idempotent replay.
      - on: STALE_EVENT
        action: ack-and-drop
        rationale: Out-of-order upgrade — newer tier already applied.
    delivery: at-least-once
    open_question: >-
      FUNC-0009 declares only an UPGRADE subscription. Tier downgrades
      (BNK.RLVR.RVT.BSP.001.TIER_DOWNGRADE_RECORDED, emitted by AGG.TIER_OF_CASE)
      are NOT subscribed-to and therefore never reach the dashboard.
      The progress bar may visually drift from reality after a downgrade.
      Decision: leave as-is (FUNC-0009 is explicit about the gamification
      stance "encourage without patronising") OR add a downgrade
      subscription. See README open question.

  - id: POL.CHN.001.DSH.ON_ENVELOPE_CONSUMPTION_RECORDED
    name: Record envelope consumption on the dashboard
    intent: >-
      Whenever BNK.RLVR.CAP.BSP.004.ENV emits BNK.RLVR.RVT.CONSUMPTION_RECORDED for a case,
      the BFF translates it into a RECORD_ENVELOPE_CONSUMPTION command so
      the available balance, the envelope status, and the recent-
      transactions feed are kept fresh between two polling cycles.
    listens_to:
      - resource_event: BNK.RLVR.RVT.BSP.004.CONSUMPTION_RECORDED
        business_subscription: BNK.RLVR.SUB.BUSINESS.CHN.001.003
        resource_subscription: BNK.RLVR.SUB.RESOURCE.CHN.001.003
        trigger_kind: ENVELOPE_CONSUMED
    issues: CMD.CHN.001.DSH.RECORD_ENVELOPE_CONSUMPTION
    mapping_rule: >-
      Build CMD payload from the upstream resource event:
        case_id                    <- upstream.case_id
        trigger.event_id           <- upstream.event_id (idempotency key)
        trigger.envelope_id        <- upstream.envelope_id
        trigger.category           <- upstream.category
        trigger.transaction_id     <- upstream.transaction_id
        trigger.amount             <- upstream.amount
        trigger.currency           <- upstream.currency
        trigger.merchant_label     <- upstream.merchant_label (label only — no PII)
        trigger.allocated_amount   <- upstream.allocated_amount   (envelope snapshot)
        trigger.consumed_amount    <- upstream.consumed_amount    (envelope snapshot)
        trigger.available_amount   <- upstream.available_amount   (envelope snapshot)
        trigger.recorded_at        <- upstream.recorded_at
    error_handling:
      - on: EVENT_ALREADY_PROCESSED
        action: ack-and-drop
        rationale: Idempotent replay.
    delivery: at-least-once
    open_question: >-
      The exact field set carried by BNK.RLVR.RVT.BSP.004.CONSUMPTION_RECORDED is
      defined upstream by BNK.RLVR.CAP.BSP.004.ENV. Several fields above (envelope
      snapshot, merchant_label) are inferred from the dashboard's
      requirements; alignment with the BSP.004 contract MUST be verified
      when BNK.RLVR.CAP.BSP.004.ENV's process model lands. Track in README.
