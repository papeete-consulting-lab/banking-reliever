meta:
  capability: BNK.RLVR.CAP.CHN.001.DSH
  layer: process-modelling
  version: 0.2.0
  governing_adrs:
    - ADR-BCM-FUNC-0009     # L2 breakdown of BNK.RLVR.CAP.CHN.001 — Beneficiary Journey
    - ADR-BCM-URBA-0009     # Definition of an event-driven capability
    - ADR-BCM-URBA-0010     # L2 capabilities as the urbanisation pivot
    - ADR-TECH-STRAT-001    # Bus topology rules (Rule 3 — payload form is domain-event-DDD)
    - ADR-TECH-STRAT-007    # Identifier strategy — UUIDv7, immutable anchors
    - ADR-TECH-TACT-001     # Tactical stack — vanilla-js, BFF, etag, polling, pii-exclusion

# ──────────────────────────────────────────────────────────────
# Aggregates — the consistency boundaries of this capability.
# CHN.001.DSH is a Backend-For-Frontend that materialises a
# per-beneficiary view by listening to upstream BSP events. It
# owns ONE aggregate, holding the synthesised state queried by
# the mobile dashboard. The aggregate state is the projection;
# the BFF does not fan out to a separate read store.
# Identifier: AGG.<ZONE>.<L1>.<L2>.<NAME>
# ──────────────────────────────────────────────────────────────

aggregates:

  - id: AGG.CHN.001.DSH.BENEFICIARY_DASHBOARD
    name: Beneficiary dashboard view
    business_object: BNK.RLVR.OBJ.BSP.002.PARTICIPATION
    aggregate_id_field: case_id
    cardinality: one-per-case
    description: >-
      Per-beneficiary singleton holding the synthetic view that the mobile
      dashboard renders: current autonomy tier, latest behavioural score,
      open envelopes with available balances, recent transactions, and
      last-viewed timestamp. The aggregate is materialised lazily on the
      first incoming upstream event for a given case_id (score, tier, or
      envelope-consumption). All four commands accepted by this aggregate
      mutate exactly this state — no other consistency boundary exists in
      the BFF. The aggregate is intentionally thin: gamification logic
      (tier definitions, score thresholds) is owned upstream by REF/BSP
      capabilities and is consumed read-through, never re-derived.

    state:
      - field: case_id
        kind: identity
      - field: current_tier_code
        kind: snapshot
        nullable_until_initialised: true
      - field: tier_upgraded_at
        kind: snapshot
        nullable_until_initialised: true
      - field: current_score
        kind: snapshot
        nullable_until_initialised: true
      - field: score_recomputed_at
        kind: snapshot
        nullable_until_initialised: true
      - field: open_envelopes
        kind: snapshot
        shape:
          item:
            envelope_id: string
            category: string
            allocated_amount: number
            consumed_amount: number
            available_amount: number
            currency: string
            last_updated_at: timestamp
        description: >-
          Live snapshot of the beneficiary's currently open envelopes.
          Updated on every BNK.RLVR.RVT.BSP.004.CONSUMPTION_RECORDED. Closed or
          archived envelopes are NOT pruned by this aggregate (no closure
          event consumed) — see open question in README.
      - field: recent_transactions
        kind: snapshot
        shape:
          bounded_by: { count: 50, age: 30d }
          item:
            transaction_id: string
            envelope_id: string
            category: string
            amount: number
            currency: string
            merchant_label: string
            recorded_at: timestamp
        description: >-
          Most-recent-first bounded list of consumption events. Eviction is
          applied at write-time: oldest entries are dropped when either bound
          (age 30d, count 50) is breached. Used by QRY.LIST_RECENT_TRANSACTIONS.
      - field: last_viewed_at
        kind: snapshot
        nullable_until_initialised: true
        description: >-
          Timestamp of the last accepted RECORD_DASHBOARD_VIEW. Used to
          enforce the 30-second debounce window on telemetry emission.
      - field: last_processed_event_ids
        kind: idempotency
        shape:
          bounded_by: { count: 200, age: 30d }
          item: string
        description: >-
          Bounded set of upstream resource_event ids the aggregate has
          already applied. Replay protection for the at-least-once bus.

    accepted_commands:
      - CMD.CHN.001.DSH.RECORD_DASHBOARD_VIEW
      - CMD.CHN.001.DSH.SYNCHRONIZE_SCORE
      - CMD.CHN.001.DSH.SYNCHRONIZE_TIER
      - CMD.CHN.001.DSH.RECORD_ENVELOPE_CONSUMPTION

    emitted_resource_events:
      - BNK.RLVR.RVT.CHN.001.DASHBOARD_VIEWED

    invariants:
      - id: INV.DSH.001
        rule: >-
          The aggregate state contains NO personally identifiable information.
          Allowed fields are case_id (an opaque participation identifier),
          tier code, numeric score, envelope amounts, category labels, and
          ISO timestamps. Beneficiary names, contact details, and any field
          carried by BNK.RLVR.OBJ.SUP.002.BENEFICIARY_RECORD MUST NOT enter the
          aggregate, the projection, or the emitted RVT payload.
        rationale: >-
          ADR-TECH-TACT-001 mandates `pii-exclusion` for the channel layer.
          PII resolution is delegated to consumers via BNK.RLVR.CAP.SUP.002.BEN
          look-ups when needed (beneficiary identity anchor was relocated
          from BNK.RLVR.CAP.REF.001 to BNK.RLVR.CAP.SUP.002 per ADR-BCM-FUNC-0016).

      - id: INV.DSH.002
        rule: >-
          A single upstream resource_event id is applied at most once.
          Duplicates from any of the three consumed bus channels are silently
          dropped (idempotent no-op). Detection uses the bounded set in
          last_processed_event_ids.
        rationale: >-
          At-least-once delivery on RabbitMQ (ADR-TECH-STRAT-001) — every
          consumer must tolerate replay. Bounded set keeps memory cost
          predictable for an in-memory BFF (ADR-TECH-TACT-001).

      - id: INV.DSH.003
        rule: >-
          Stale upstream events are rejected. SYNCHRONIZE_SCORE is rejected
          if its trigger.recomputed_at is older than score_recomputed_at;
          SYNCHRONIZE_TIER is rejected if its trigger.upgraded_at is older
          than tier_upgraded_at. Stale events are acked-and-dropped, never
          DLQ'd (out-of-order delivery is expected, not pathological).
        rationale: >-
          RabbitMQ does not guarantee global ordering across topics. Score
          and tier mutations must be monotonic in the dashboard view to
          avoid visible regression on the beneficiary's progression bar.

      - id: INV.DSH.004
        rule: >-
          RECORD_DASHBOARD_VIEW emits BNK.RLVR.RVT.CHN.001.DASHBOARD_VIEWED only when
          (now - last_viewed_at) >= 30 seconds, OR when last_viewed_at is null.
          Inside the debounce window the command is acked as an idempotent
          no-op (HTTP 200, no event emitted).
        rationale: >-
          Server-side debounce prevents background polling and tab refocus
          from spamming the bus with telemetry. Keeps DASHBOARD_VIEWED
          analytics interpretable as "intentional consultation".

      - id: INV.DSH.005
        rule: >-
          recent_transactions is bounded at 50 entries and 30 days. On every
          RECORD_ENVELOPE_CONSUMPTION application, entries older than 30 days
          are evicted before insertion; if the resulting list still exceeds
          50 items, the oldest entries are dropped to fit.
        rationale: >-
          Bounded in-memory state for the BFF (ADR-TECH-TACT-001 implies
          modest footprint per beneficiary). Aligns with PII minimisation —
          stale transaction labels are evicted automatically.

      - id: INV.DSH.006
        rule: >-
          The aggregate is created lazily on the first accepted command for
          a given case_id, regardless of which command arrives first. The
          first event from any of the three consumed channels (or an explicit
          RECORD_DASHBOARD_VIEW from the frontend) materialises the aggregate
          with the corresponding state field populated; the others remain
          null until their respective event arrives.
        rationale: >-
          The BFF cannot rely on a "case_opened" trigger from BSP.002.CYC
          (no business-subscription declared in FUNC-0009). Lazy creation
          keeps the model agnostic to upstream event ordering.
        open_question: >-
          Should the BFF subscribe to a future BNK.RLVR.EVT.BSP.002.CASE_OPENED to
          materialise the dashboard eagerly with empty placeholders? See
          README "Open process-level questions".

    consistency_boundary: per-aggregate-instance
    transactional_outbox: required
    snapshotting:
      strategy: every-N-events
      n: 100
