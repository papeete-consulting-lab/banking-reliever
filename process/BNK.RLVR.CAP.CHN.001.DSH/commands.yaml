meta:
  capability: BNK.RLVR.CAP.CHN.001.DSH
  layer: process-modelling
  version: 0.2.0
  governing_adrs:
    - ADR-BCM-FUNC-0009
    - ADR-BCM-URBA-0009
    - ADR-TECH-STRAT-003   # API contract strategy — REST/HTTP, BFF per channel
    - ADR-TECH-STRAT-008   # Capability as multi-faceted information producer

# ──────────────────────────────────────────────────────────────
# Commands — verbs the dashboard BFF accepts. RECORD_DASHBOARD_VIEW
# is the only externally-issued command (called by the mobile
# frontend); the other three are internally issued by the policies
# that translate consumed BSP events into state mutations.
# Identifier: CMD.<ZONE>.<L1>.<L2>.<VERB>
# ──────────────────────────────────────────────────────────────

commands:

  - id: CMD.CHN.001.DSH.RECORD_DASHBOARD_VIEW
    name: Record a beneficiary dashboard consultation
    intent: >-
      The mobile frontend signals that the beneficiary has explicitly opened
      or refreshed the dashboard tab. The BFF debounces these calls (30s per
      case_id) and emits BNK.RLVR.RVT.CHN.001.DASHBOARD_VIEWED when the call falls
      outside the debounce window — this is the single domain event of the
      capability and feeds engagement analytics downstream.
    accepted_by: AGG.CHN.001.DSH.BENEFICIARY_DASHBOARD
    issued_by:
      - http  # POST /cases/{case_id}/dashboard-views from the vanilla-JS frontend
    payload_schema: schemas/CMD.CHN.001.DSH.RECORD_DASHBOARD_VIEW.schema.json
    preconditions:
      - id: PRE.001
        rule: case_id is present and non-empty in the request path.
      - id: PRE.002
        rule: client_request_id is present (used as idempotency key for retries).
    invariants_enforced:
      - INV.DSH.001  # PII exclusion in emitted RVT payload
      - INV.DSH.004  # 30-second debounce
    emits:
      - BNK.RLVR.RVT.CHN.001.DASHBOARD_VIEWED
      # business-event family pivot (no autonomous bus message — Rule 2 of ADR-TECH-STRAT-001):
      # BNK.RLVR.EVT.CHN.001.DASHBOARD_VIEWED
    errors:
      - code: VIEW_DEBOUNCED
        when: >-
          The previous accepted view for case_id is less than 30 seconds old.
          Returned as HTTP 200 (idempotent no-op) — NOT an error from the
          frontend's perspective, but kept here as a discriminator for
          observability counters.
    idempotency:
      key: client_request_id
      window: 5m
      note: >-
        client_request_id idempotency is short (5m) and orthogonal to the
        30-second debounce on RVT emission. Together they de-duplicate both
        accidental HTTP retries (idempotency) and intentional polling
        (debounce).
    api_binding: { method: POST, path: "/cases/{case_id}/dashboard-views" }

  - id: CMD.CHN.001.DSH.SYNCHRONIZE_SCORE
    name: Synchronise the dashboard score snapshot
    intent: >-
      Apply the latest behavioural score recomputation from BNK.RLVR.CAP.BSP.001.SCO
      to the beneficiary dashboard. Updates current_score and
      score_recomputed_at on the aggregate. Internal — never exposed via
      HTTP, never emits a domain event (the dashboard is a read-side view,
      not an authoritative source of the score).
    accepted_by: AGG.CHN.001.DSH.BENEFICIARY_DASHBOARD
    issued_by:
      - POL.CHN.001.DSH.ON_SCORE_RECOMPUTED
    payload_schema: schemas/CMD.CHN.001.DSH.SYNCHRONIZE_SCORE.schema.json
    preconditions:
      - id: PRE.001
        rule: trigger.event_id has not already been applied (INV.DSH.002).
      - id: PRE.002
        rule: trigger.recomputed_at is not older than the current score_recomputed_at (INV.DSH.003).
    invariants_enforced:
      - INV.DSH.001
      - INV.DSH.002
      - INV.DSH.003
      - INV.DSH.006
    emits: []  # internal mutation only — no autonomous bus message
    errors:
      - code: EVENT_ALREADY_PROCESSED
        when: trigger.event_id is in last_processed_event_ids (idempotent ack-and-drop).
      - code: STALE_EVENT
        when: trigger.recomputed_at < score_recomputed_at (out-of-order ack-and-drop).
    idempotency:
      key: trigger.event_id
      window: 30d
    api_binding: null  # no HTTP surface — issued only by the policy

  - id: CMD.CHN.001.DSH.SYNCHRONIZE_TIER
    name: Synchronise the dashboard tier snapshot
    intent: >-
      Apply the latest tier upgrade from BNK.RLVR.CAP.BSP.001.TIE to the beneficiary
      dashboard. Updates current_tier_code and tier_upgraded_at on the
      aggregate. Internal — never exposed via HTTP, never emits a domain
      event. The mobile UI uses this to trigger the rewarding tier-upgrade
      animation; the animation logic is frontend-only and reads the
      transition timestamp via QRY.GET_DASHBOARD.
    accepted_by: AGG.CHN.001.DSH.BENEFICIARY_DASHBOARD
    issued_by:
      - POL.CHN.001.DSH.ON_TIER_UPGRADE_RECORDED
    payload_schema: schemas/CMD.CHN.001.DSH.SYNCHRONIZE_TIER.schema.json
    preconditions:
      - id: PRE.001
        rule: trigger.event_id has not already been applied.
      - id: PRE.002
        rule: trigger.upgraded_at is not older than the current tier_upgraded_at.
    invariants_enforced:
      - INV.DSH.001
      - INV.DSH.002
      - INV.DSH.003
      - INV.DSH.006
    emits: []
    errors:
      - code: EVENT_ALREADY_PROCESSED
        when: trigger.event_id has already been applied (idempotent ack-and-drop).
      - code: STALE_EVENT
        when: trigger.upgraded_at < tier_upgraded_at (out-of-order ack-and-drop).
    idempotency:
      key: trigger.event_id
      window: 30d
    api_binding: null

  - id: CMD.CHN.001.DSH.RECORD_ENVELOPE_CONSUMPTION
    name: Record an envelope consumption on the dashboard
    intent: >-
      Apply an envelope consumption event from BNK.RLVR.CAP.BSP.004.ENV to the
      beneficiary dashboard. Updates the matching open_envelopes entry
      (available_amount, consumed_amount, last_updated_at) and inserts a
      new entry at the head of recent_transactions, applying the bounded-
      retention policy (INV.DSH.005). Internal — no HTTP surface, no
      emitted bus event.
    accepted_by: AGG.CHN.001.DSH.BENEFICIARY_DASHBOARD
    issued_by:
      - POL.CHN.001.DSH.ON_ENVELOPE_CONSUMPTION_RECORDED
    payload_schema: schemas/CMD.CHN.001.DSH.RECORD_ENVELOPE_CONSUMPTION.schema.json
    preconditions:
      - id: PRE.001
        rule: trigger.event_id has not already been applied.
      - id: PRE.002
        rule: trigger.envelope_id and trigger.transaction_id are non-empty.
    invariants_enforced:
      - INV.DSH.001
      - INV.DSH.002
      - INV.DSH.005
      - INV.DSH.006
    emits: []
    errors:
      - code: EVENT_ALREADY_PROCESSED
        when: trigger.event_id has already been applied (idempotent ack-and-drop).
    idempotency:
      key: trigger.event_id
      window: 30d
    api_binding: null
