meta:
  capability: BNK.RLVR.CAP.CHN.001.DSH
  layer: process-modelling
  version: 0.2.0
  derivation: >-
    This file is the synthesised HTTP/RPC surface of BNK.RLVR.CAP.CHN.001.DSH. It is
    DERIVED from commands.yaml + read-models.yaml — the api_binding fields
    declared there. Keep in sync; the create-bff agent consumes this view.
    The dashboard BFF is the public face of the capability for the mobile
    frontend; only RECORD_DASHBOARD_VIEW exposes a state-mutating endpoint
    — the three SYNCHRONIZE_* commands are issued internally by policies
    and have no HTTP surface.

api:
  base_path: /capabilities/chn/001/dsh
  authentication: bearer-token (sourced from BNK.RLVR.CAP.SUP.001 — out of scope here)
  authorization_note: >-
    Per ADR-TECH-STRAT-003 bi-layer security, the BFF enforces the channel-
    side check (the bearer token's beneficiary subject MUST match the
    case_id's owner). Inter-service authorization for upstream queries is
    out of scope — the dashboard reads state from its own in-memory aggregate.

  # ── Command endpoints (state-mutating) ──
  commands:
    - operation_id: recordDashboardView
      method: POST
      path: /cases/{case_id}/dashboard-views
      issues: CMD.CHN.001.DSH.RECORD_DASHBOARD_VIEW
      request_schema: schemas/CMD.CHN.001.DSH.RECORD_DASHBOARD_VIEW.schema.json
      responses:
        201: { description: "View recorded; BNK.RLVR.RVT.CHN.001.DASHBOARD_VIEWED emitted on the bus" }
        200: { description: "VIEW_DEBOUNCED — idempotent no-op (within the 30s debounce window)" }
        400: { description: "Missing or invalid client_request_id / case_id" }

  # ── Query endpoints (read-only) ──
  queries:
    - operation_id: getDashboard
      method: GET
      path: /cases/{case_id}/dashboard
      serves: QRY.CHN.001.DSH.GET_DASHBOARD
      cache: { etag: true, max_age: PT5S }
      responses:
        200: { description: "Dashboard view (PII-free synthesised snapshot)" }
        304: { description: "Not Modified (ETag match — most polling responses are 304)" }
        404: { description: "No dashboard state for case_id (aggregate not yet materialised)" }

    - operation_id: listRecentTransactions
      method: GET
      path: /cases/{case_id}/transactions
      serves: QRY.CHN.001.DSH.LIST_RECENT_TRANSACTIONS
      query_params:
        - { name: limit, in: query, type: integer, default: 20, max: 50 }
      cache: { etag: true, max_age: PT5S }
      responses:
        200: { description: "Recent transactions (most-recent-first, bounded by 50/30d)" }
        304: { description: "Not Modified" }
        404: { description: "No dashboard state for case_id" }
