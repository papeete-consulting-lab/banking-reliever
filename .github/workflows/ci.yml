name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # NOTE: the former `forbidden-paths` job (which rejected PRs touching
  # `process/` from non-`process/*` branches) was removed when the DDD
  # Process Modelling layer migrated to the reliever-knowledge repo. There is
  # no `process/` folder here any more; the process model is consumed
  # read-only via `rlv-knowledge process <CAP_ID>`, and its write-protection now
  # lives in reliever-knowledge.

  language-check:
    name: Code Language Matches BCM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # The BCM and the process model no longer live in this repo — both are
      # hosted in the private `reliever-knowledge` repo and consumed via the
      # `rlv-knowledge` CLI. check_language.py discovers capabilities via
      # `rlv-knowledge process --list` and fetches prose via `rlv-knowledge pack`, so
      # the installed CLI must include the `process` subcommand (post-v2.0.0
      # — we pin `main`). Requires a token with read access to
      # Banking-PapeeteConsulting/reliever-knowledge in the `RELIEVER_KNOWLEDGE_TOKEN`
      # repo secret.
      #
      # If the secret is not set (or installation fails for any other
      # reason), the install step succeeds silently and the script will
      # detect the missing CLI and skip the check (exit 0). Configure the
      # secret to make this check effective.
      - name: Install rlv-knowledge from reliever-knowledge (optional)
        id: install_bcm_pack
        continue-on-error: true
        env:
          RELIEVER_KNOWLEDGE_TOKEN: ${{ secrets.RELIEVER_KNOWLEDGE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${RELIEVER_KNOWLEDGE_TOKEN:-}" ]; then
            echo "ℹ RELIEVER_KNOWLEDGE_TOKEN secret not set — skipping rlv-knowledge install."
            echo "  The language-check script will run in skip mode."
            exit 0
          fi
          pip install --upgrade pip
          # rlv-knowledge depends on gov-pack, sourced from the *private*
          # banking-governance repo over https. The token embedded in the
          # reliever-knowledge URL below only covers that top-level clone — the
          # transitive gov-pack clone uses a bare `https://github.com/...` URL
          # and would fail with "could not read Username". Rewrite bare github
          # https URLs to carry the token so transitive private clones auth too.
          git config --global url."https://x-access-token:${RELIEVER_KNOWLEDGE_TOKEN}@github.com/".insteadOf "https://github.com/"
          pip install "git+https://${RELIEVER_KNOWLEDGE_TOKEN}@github.com/Banking-PapeeteConsulting/reliever-knowledge.git@main"
          rlv-knowledge --help >/dev/null
          rlv-knowledge process --list >/dev/null   # fail fast if the CLI predates the `process` subcommand

      - name: Verify natural language consistency (BCM ↔ code)
        run: python3 .github/scripts/check_language.py

  dotnet:
    name: .NET Build & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Discover .NET solutions under sources/
        id: discover
        shell: bash
        run: |
          # A solution is skipped when any ancestor directory (up to sources/)
          # carries a `.ci-skip-build` marker. Used to quarantine artifacts that
          # are mid-migration / pending regeneration (their content is knowingly
          # inconsistent with upstream contracts). The marker file documents why.
          mapfile -t ALL < <(find sources -type f \( -name "*.sln" -o -name "*.slnx" \) 2>/dev/null | sort)
          SOLUTIONS=()
          for SLN in "${ALL[@]:-}"; do
            [ -z "$SLN" ] && continue
            d=$(dirname "$SLN"); skip=""
            while [ "$d" != "." ] && [ "$d" != "/" ]; do
              if [ -f "$d/.ci-skip-build" ]; then skip="$d/.ci-skip-build"; break; fi
              [ "$d" = "sources" ] && break
              d=$(dirname "$d")
            done
            if [ -n "$skip" ]; then
              echo "⏭  Quarantined (skip via $skip): $SLN"
            else
              SOLUTIONS+=("$SLN")
            fi
          done
          if [ ${#SOLUTIONS[@]} -eq 0 ]; then
            echo "No .NET solutions found under sources/. Nothing to build or test."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Found ${#SOLUTIONS[@]} solution(s):"
          printf '  %s\n' "${SOLUTIONS[@]}"
          echo "found=true" >> "$GITHUB_OUTPUT"
          {
            echo "solutions<<SOLUTIONS_EOF"
            printf '%s\n' "${SOLUTIONS[@]}"
            echo "SOLUTIONS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Restore, build, test each solution
        if: steps.discover.outputs.found == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _ci/test-results
          while IFS= read -r SLN; do
            [ -z "$SLN" ] && continue
            echo "::group::🔧 $SLN"
            NAME=$(printf '%s' "$SLN" | sed 's|/|_|g; s|^sources_||; s|\.[a-z]*$||')

            dotnet restore "$SLN"
            dotnet build   "$SLN" --no-restore --configuration Release
            dotnet test    "$SLN" \
              --no-build --configuration Release \
              --logger "trx;LogFileName=${NAME}.trx" \
              --logger "console;verbosity=normal" \
              --results-directory _ci/test-results
            echo "::endgroup::"
          done <<< "${{ steps.discover.outputs.solutions }}"

      - name: Upload test results (.trx)
        if: always() && steps.discover.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-test-results
          path: _ci/test-results/**/*.trx
          if-no-files-found: warn
          retention-days: 30
