name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  forbidden-paths:
    name: Forbidden Paths (PR governance gate)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reject changes to process/ from non-process branches
        shell: bash
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          HEAD_REF="${{ github.event.pull_request.head.ref }}"
          git fetch --no-tags --depth=1 origin "$BASE_SHA" 2>/dev/null || true

          # process/{capability-id}/ is the DDD tactical model. It is owned
          # exclusively by the /process skill, which works on a dedicated
          # branch named `process/<CAP_ID>` and publishes via its own PR.
          # No other branch (in particular feat/TASK-NNN-* PRs from
          # /launch-task, /code, /fix) may modify process/.
          # See CLAUDE.md and README.md for the full invariant.
          PROTECTED_REGEX='^process/'

          # Allow modifications under process/ only from a dedicated
          # process/<CAP_ID> branch. <CAP_ID> is the full source-context-prefixed
          # form (process/BNK.RLVR.CAP.…) since bcm-pack v1.0.0, with a
          # back-compatible fallback to the legacy short form (process/CAP.…).
          if [[ "$HEAD_REF" =~ ^process/([A-Z][A-Z0-9]*\.[A-Z][A-Z0-9]*\.)?CAP\..+ ]]; then
            echo "✓ Head branch '$HEAD_REF' is a /process branch — process/ modifications allowed."
            exit 0
          fi

          mapfile -t CHANGED < <(git diff --name-only --diff-filter=ACMRTD "$BASE_SHA"..."$HEAD_SHA")
          OFFENDERS=()
          for f in "${CHANGED[@]:-}"; do
            [ -z "$f" ] && continue
            if [[ "$f" =~ $PROTECTED_REGEX ]]; then
              OFFENDERS+=("$f")
            fi
          done

          if [ ${#OFFENDERS[@]} -gt 0 ]; then
            echo "❌ This PR (head branch '$HEAD_REF') modifies files under process/."
            echo "   process/ is owned exclusively by the /process skill and may only"
            echo "   be modified through a dedicated 'process/<CAP_ID>' PR."
            echo
            echo "Offending files:"
            printf '  - %s\n' "${OFFENDERS[@]}"
            echo
            echo "To change the process model, run /process <CAP_ID> locally — it"
            echo "will create the right branch and worktree and open the right PR."
            exit 1
          fi
          echo "✓ No process/ modifications on this branch."

  language-check:
    name: Code Language Matches BCM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # The BCM no longer lives in this repo — it is hosted in the private
      # `banking-knowledge` repo and consumed via the `bcm-pack` CLI. To
      # check that code under sources/ uses the same natural language as
      # the BCM, install bcm-pack from that repo. Requires a token with
      # read access to Banking-Reliever/banking-knowledge in the
      # `BANKING_KNOWLEDGE_TOKEN` repo secret.
      #
      # If the secret is not set (or installation fails for any other
      # reason), the install step succeeds silently and the script will
      # detect the missing CLI and skip the check (exit 0). Configure the
      # secret to make this check effective.
      - name: Install bcm-pack from banking-knowledge (optional)
        id: install_bcm_pack
        continue-on-error: true
        env:
          BANKING_KNOWLEDGE_TOKEN: ${{ secrets.BANKING_KNOWLEDGE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${BANKING_KNOWLEDGE_TOKEN:-}" ]; then
            echo "ℹ BANKING_KNOWLEDGE_TOKEN secret not set — skipping bcm-pack install."
            echo "  The language-check script will run in skip mode."
            exit 0
          fi
          pip install --upgrade pip
          pip install "git+https://${BANKING_KNOWLEDGE_TOKEN}@github.com/Banking-Reliever/banking-knowledge.git@v0.1.0"
          bcm-pack --help >/dev/null

      - name: Verify natural language consistency (BCM ↔ code)
        run: python3 .github/scripts/check_language.py

  dotnet:
    name: .NET Build & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Discover .NET solutions under sources/
        id: discover
        shell: bash
        run: |
          # A solution is skipped when any ancestor directory (up to sources/)
          # carries a `.ci-skip-build` marker. Used to quarantine artifacts that
          # are mid-migration / pending regeneration (their content is knowingly
          # inconsistent with upstream contracts). The marker file documents why.
          mapfile -t ALL < <(find sources -type f \( -name "*.sln" -o -name "*.slnx" \) 2>/dev/null | sort)
          SOLUTIONS=()
          for SLN in "${ALL[@]:-}"; do
            [ -z "$SLN" ] && continue
            d=$(dirname "$SLN"); skip=""
            while [ "$d" != "." ] && [ "$d" != "/" ]; do
              if [ -f "$d/.ci-skip-build" ]; then skip="$d/.ci-skip-build"; break; fi
              [ "$d" = "sources" ] && break
              d=$(dirname "$d")
            done
            if [ -n "$skip" ]; then
              echo "⏭  Quarantined (skip via $skip): $SLN"
            else
              SOLUTIONS+=("$SLN")
            fi
          done
          if [ ${#SOLUTIONS[@]} -eq 0 ]; then
            echo "No .NET solutions found under sources/. Nothing to build or test."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Found ${#SOLUTIONS[@]} solution(s):"
          printf '  %s\n' "${SOLUTIONS[@]}"
          echo "found=true" >> "$GITHUB_OUTPUT"
          {
            echo "solutions<<SOLUTIONS_EOF"
            printf '%s\n' "${SOLUTIONS[@]}"
            echo "SOLUTIONS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Restore, build, test each solution
        if: steps.discover.outputs.found == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _ci/test-results
          while IFS= read -r SLN; do
            [ -z "$SLN" ] && continue
            echo "::group::🔧 $SLN"
            NAME=$(printf '%s' "$SLN" | sed 's|/|_|g; s|^sources_||; s|\.[a-z]*$||')

            dotnet restore "$SLN"
            dotnet build   "$SLN" --no-restore --configuration Release
            dotnet test    "$SLN" \
              --no-build --configuration Release \
              --logger "trx;LogFileName=${NAME}.trx" \
              --logger "console;verbosity=normal" \
              --results-directory _ci/test-results
            echo "::endgroup::"
          done <<< "${{ steps.discover.outputs.solutions }}"

      - name: Upload test results (.trx)
        if: always() && steps.discover.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-test-results
          path: _ci/test-results/**/*.trx
          if-no-files-found: warn
          retention-days: 30
