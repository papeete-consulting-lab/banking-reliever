name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # NOTE: the former `forbidden-paths` job (which rejected PRs touching
  # `process/` from non-`process/*` branches) was removed when the DDD
  # Process Modelling layer migrated to the reliever-knowledge repo. There is
  # no `process/` folder here any more; the process model is consumed
  # read-only via `kpack process <CAP_ID>`, and its write-protection now
  # lives in reliever-knowledge.

  language-check:
    name: Code Language Matches BCM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # The BCM and the process model no longer live in this repo — both are
      # hosted in the private `reliever-knowledge` repo (context BNK.RLVR) and
      # consumed via the single `kpack` engine (the GHCR container
      # `ghcr.io/naive-unicorn/kpack`, which replaces rlv-knowledge/tech/gov-pack).
      # check_language.py discovers capabilities via `kpack process BNK.RLVR
      # --list` and fetches prose via `kpack pack`, so a bare `kpack` must be on
      # PATH. We expose it via the repo's `bin/kpack` container wrapper.
      #
      # Auth: the `RELIEVER_KNOWLEDGE_TOKEN` secret must be a token with
      # `read:packages` on the naive-unicorn org (to pull the private image) AND
      # read access to the private corpora kpack resolves (reliever-knowledge,
      # and — via the governance registry in .kpack.yaml — banking-governance,
      # banking-tech). The wrapper passes it into the container as GITHUB_TOKEN
      # so kpack's git clones of those private corpora authenticate.
      #
      # If the secret is not set (or the image cannot be pulled for any other
      # reason), this step succeeds silently and the script detects the missing
      # CLI and skips the check (exit 0). Configure the secret to make it effective.
      - name: Make kpack available (optional)
        id: install_kpack
        continue-on-error: true
        env:
          RELIEVER_KNOWLEDGE_TOKEN: ${{ secrets.RELIEVER_KNOWLEDGE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${RELIEVER_KNOWLEDGE_TOKEN:-}" ]; then
            echo "ℹ RELIEVER_KNOWLEDGE_TOKEN secret not set — skipping kpack setup."
            echo "  The language-check script will run in skip mode."
            exit 0
          fi
          # Authenticate to GHCR and pre-pull the private kpack image so the
          # bin/kpack wrapper's `docker run` calls don't re-pull each invocation.
          echo "${RELIEVER_KNOWLEDGE_TOKEN}" | docker login ghcr.io -u x-access-token --password-stdin
          docker pull ghcr.io/naive-unicorn/kpack:v1.0.0
          # Put the wrapper on PATH and let kpack authenticate its private corpus
          # clones with the same token (the wrapper reads GITHUB_TOKEN).
          echo "${GITHUB_WORKSPACE}/bin" >> "$GITHUB_PATH"
          echo "GITHUB_TOKEN=${RELIEVER_KNOWLEDGE_TOKEN}" >> "$GITHUB_ENV"
          # Smoke-test: engine version needs no corpus/auth, proves the image runs.
          "${GITHUB_WORKSPACE}/bin/kpack" version >/dev/null

      - name: Verify natural language consistency (BCM ↔ code)
        env:
          GITHUB_TOKEN: ${{ secrets.RELIEVER_KNOWLEDGE_TOKEN }}
        run: python3 .github/scripts/check_language.py

  dotnet:
    name: .NET Build & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Discover .NET solutions under sources/
        id: discover
        shell: bash
        run: |
          # A solution is skipped when any ancestor directory (up to sources/)
          # carries a `.ci-skip-build` marker. Used to quarantine artifacts that
          # are mid-migration / pending regeneration (their content is knowingly
          # inconsistent with upstream contracts). The marker file documents why.
          mapfile -t ALL < <(find sources -type f \( -name "*.sln" -o -name "*.slnx" \) 2>/dev/null | sort)
          SOLUTIONS=()
          for SLN in "${ALL[@]:-}"; do
            [ -z "$SLN" ] && continue
            d=$(dirname "$SLN"); skip=""
            while [ "$d" != "." ] && [ "$d" != "/" ]; do
              if [ -f "$d/.ci-skip-build" ]; then skip="$d/.ci-skip-build"; break; fi
              [ "$d" = "sources" ] && break
              d=$(dirname "$d")
            done
            if [ -n "$skip" ]; then
              echo "⏭  Quarantined (skip via $skip): $SLN"
            else
              SOLUTIONS+=("$SLN")
            fi
          done
          if [ ${#SOLUTIONS[@]} -eq 0 ]; then
            echo "No .NET solutions found under sources/. Nothing to build or test."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Found ${#SOLUTIONS[@]} solution(s):"
          printf '  %s\n' "${SOLUTIONS[@]}"
          echo "found=true" >> "$GITHUB_OUTPUT"
          {
            echo "solutions<<SOLUTIONS_EOF"
            printf '%s\n' "${SOLUTIONS[@]}"
            echo "SOLUTIONS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Restore, build, test each solution
        if: steps.discover.outputs.found == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _ci/test-results
          while IFS= read -r SLN; do
            [ -z "$SLN" ] && continue
            echo "::group::🔧 $SLN"
            NAME=$(printf '%s' "$SLN" | sed 's|/|_|g; s|^sources_||; s|\.[a-z]*$||')

            dotnet restore "$SLN"
            dotnet build   "$SLN" --no-restore --configuration Release
            dotnet test    "$SLN" \
              --no-build --configuration Release \
              --logger "trx;LogFileName=${NAME}.trx" \
              --logger "console;verbosity=normal" \
              --results-directory _ci/test-results
            echo "::endgroup::"
          done <<< "${{ steps.discover.outputs.solutions }}"

      - name: Upload test results (.trx)
        if: always() && steps.discover.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-test-results
          path: _ci/test-results/**/*.trx
          if-no-files-found: warn
          retention-days: 30
